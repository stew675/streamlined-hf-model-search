<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  tr.detail-row td { padding: 0; background: #010409; }

  .detail-inner table { font-size: 0.8rem; }

  .detail-inner th:hover { background: #1a2030; }

  .detail-count { font-size: 0.75rem; color: #8b949e; margin-top: 4px; }

  tr.l2-row td { cursor: pointer; padding-left: 32px !important; }
  tr.l2-row:hover td { background: #1a2030; }

  tr.l3-row td { cursor: pointer; padding-left: 48px !important; font-weight: 500; }
  tr.l3-row:hover td { background: #1a2030; }
  tr.l3-row td:first-child { padding-left: 48px !important; }

  tr.l4-row td { padding-left: 32px !important; }

  .likes-icon { color: #f85149; margin-left: 2px; }
  .cell-flex { display: flex; align-items: center; }

 /* Filter bar */
  #task-bars { display: flex; flex-wrap: wrap; gap: 20px; margin: 8px 0 12px; align-items: center; }

  .task-bar-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 0 6px; align-items: center; }
   .task-bar-row .filter-label { color: #8b949e; font-size: 0.78rem; margin-right: 4px; }

  #text-filter-row .fic:hover { color: #f85149; }
  #text-filter-row .fiw input:not(:placeholder-shown) + .fic { display: block; }

  /* Range sliders */
  #date-slider, #param-slider { margin: 8px 0 6px; padding: 8px 14px 10px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; }
  #date-slider .ds-title, #param-slider .ds-title { font-size: 0.78rem; color: #8b949e; margin-bottom: 4px; font-weight: 600; }
  .ds-track-wrap { position: relative; height: 28px; }
  .ds-track-bg, .ds-track-fill { position: absolute; top: 11px; height: 6px; border-radius: 3px; pointer-events: none; }
  .ds-track-bg { left: 0; right: 0; background: #30363d; }
  .ds-track-fill { background: #b8860b; z-index: 1; }
  .ds-track-wrap input[type=range] { position: absolute; width: 100%; top: 2px; height: 24px; margin: 0;

  #ds-from, #ps-from { z-index: 3; }
  #ds-to, #ps-to { z-index: 2; }
  .ds-track-wrap input[type=range]::-webkit-slider-runnable-track { height: 6px; background: transparent; border-radius: 3px; pointer-events: none; }
  .ds-track-wrap input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%;
    cursor: pointer; pointer-events: auto; border: 2px solid #0d1117; margin-top: -6px; }
  #ds-from::-moz-range-thumb, #ds-from::-webkit-slider-thumb,

  .ds-track-wrap input[type=range]::-moz-range-track { height: 6px; background: transparent; border-radius: 3px; pointer-events: none; }
  .ds-track-wrap input[type=range]::-moz-range-thumb { height: 18px; width: 18px; border-radius: 50%;

  .ds-labels { display: flex; justify-content: space-between; font-size: 0.72rem; margin-top: 2px; }

    border: 1px solid #30363d; white-space: nowrap; pointer-events: none; z-index: 5; }
  .ps-tooltip::after { content: ""; position: absolute; top: 100%; left: 50%; margin-left: -4px;

  .ps-tooltip.align-right { transform: translateX(-100%); }
  .ps-tooltip.align-left { transform: translateX(-9px); }
  .ps-tooltip.align-right::after { left: auto; right: 4px; margin-left: 0; }
  .ps-tooltip.align-left::after { left: 9px; margin-left: 0; }
  .ps-legend { position: relative; height: 18px; }
  .ps-legend-tick { position: absolute; top: 0; transform: translateX(-50%); width: 1px; height: 5px; background: #484f58; }
  .ps-legend-label { position: absolute; top: 6px; left: 50%; transform: translateX(-50%);
    font-size: 0.62rem; color: #6e7681; white-space: nowrap; }
</style>
</head>
<body>
<h1>🔍 A Streamlined Hugging Face Model Search</h1>
<div id="status" aria-live="polite">Fetching models…</div>
<div id="date-slider">
  <div class="ds-title">Date Range</div>
  <div class="ds-track-wrap">
    <div class="ds-track-bg"></div>
    <div class="ds-track-fill" id="ds-fill"></div>
    <input type="range" id="ds-from" min="0" max="80" value="68" step="1" role="slider" aria-label="Date range start" aria-valuemin="0" aria-valuemax="80" aria-valuenow="68">
    <input type="range" id="ds-to" min="0" max="80" value="80" step="1" role="slider" aria-label="Date range end" aria-valuemin="0" aria-valuemax="80" aria-valuenow="80">
    <div class="ps-tooltip align-right" id="ds-tooltip-from" aria-hidden="true"></div>
    <div class="ps-tooltip align-left" id="ds-tooltip-to" aria-hidden="true">Now</div>
  </div>
  <div class="ds-labels">
    <span><span class="ds-l">From:</span> <span class="ds-v" id="ds-from-label"></span></span>
    <span><span class="ds-l">To:</span> <span class="ds-v" id="ds-to-label">Now</span></span>
  </div>
</div>
<div id="param-slider">
  <div class="ds-title">Parameter Size</div>
  <div class="ds-track-wrap">
    <div class="ds-track-bg"></div>
    <div class="ds-track-fill" id="ps-fill"></div>
    <input type="range" id="ps-from" min="0" max="220" value="30" step="1" role="slider" aria-label="Parameter size start" aria-valuemin="0" aria-valuemax="220" aria-valuenow="30">
    <input type="range" id="ps-to" min="0" max="220" value="220" step="1" role="slider" aria-label="Parameter size end" aria-valuemin="0" aria-valuemax="220" aria-valuenow="220">
    <div class="ps-tooltip" id="ps-tooltip-from" style="left:0%" aria-hidden="true">750M</div>
    <div class="ps-tooltip" id="ps-tooltip-to" style="left:100%" aria-hidden="true">&gt;1T</div>
  </div>
  <div class="ds-labels">
    <span><span class="ds-l">From:</span> <span class="ds-v" id="ps-from-label">750M</span></span>
    <span><span class="ds-l">To:</span> <span class="ds-v" id="ps-to-label">&gt;1T</span></span>
  </div>
  <div class="ps-legend" id="ps-legend"></div>
</div>
<div id="task-bars">
<div id="from-bar">
  <span class="filter-label">From:</span>
</div>
<div id="to-bar">
  <span class="filter-label">To:</span>
</div>
<div id="special-bar">
  <span class="filter-label">Special:</span>
</div>
</div>
<div id="activated-types" class="task-bar-row">
  <span class="filter-label">Activated Types:</span>
</div>
<div id="available-types" class="task-bar-row">
  <span class="filter-label">Available Types:</span>
</div>
<div id="filter-row">
<div id="filter-bar">
  <span class="filter-label">Quant types:</span>
</div>
<span id="api-counter" class="filter-label" style="margin-left:auto; font-variant-numeric: tabular-nums; min-width: 100px; text-align: right;">API Calls: 0</span>
</div>
<div id="get-results-btn" style="display:flex;justify-content:center;margin:8px 0 12px;">Get Results</div>
<div id="text-filter-row">
  <label>L1 Author:</label>
  <span class="fiw"><input type="text" id="l1-author-filter" placeholder="All authors (pinned top)" autocomplete="off"><span class="fic" data-for="l1-author-filter">✕</span></span>
  <label>L2 Model ID:</label>
  <span class="fiw"><input type="text" id="l2-model-filter" placeholder="Any base model" autocomplete="off"><span class="fic" data-for="l2-model-filter">✕</span></span>
  <label>L3 Author:</label>
  <span class="fiw"><input type="text" id="l3-author-filter" placeholder="Any quant author" autocomplete="off"><span class="fic" data-for="l3-author-filter">✕</span></span>

  <span class="fiw"><input type="text" id="l4-model-filter" placeholder="Any quant model" autocomplete="off"><span class="fic" data-for="l4-model-filter">✕</span></span>
</div>
<table id="main-table">
  <thead>
    <tr>
      <th data-key="author" scope="col">Model Author<span class="arrow"></span></th>
      <th data-key="count" class="right" scope="col"><span class="sort-arrow"></span>Base Models</th>
      <th data-key="totalDownloads" class="right" scope="col"><span class="sort-arrow"></span>Total Downloads</th>
      <th data-key="totalLikes" class="right" scope="col"><span class="sort-arrow"></span>Total Likes</th>
    </tr>
  </thead>
  <tbody id="body"></tbody>
</table>
<div id="count"></div>

<script>
(function() {

let _l1AuthorFilter = "", _l2ModelFilter = "", _l3AuthorFilter = "", _l4ModelFilter = "";

const FROM_OPTIONS = ["text", "image", "audio", "video", "any", "all"];
const TO_OPTIONS = ["text", "speech", "audio", "image", "video", "3d", "any", "all"];
const activeFromFilters = new Set(["text", "image", "any"]);

const SPECIAL_DISPLAY = ["include untagged"];

// URL dedup via _inflightFetches is checked before rate limiting so concurrent requests
// for the same URL share a single inflight promise instead of each consuming a rate-limit slot.
async function fetchJson(url) {

    let retries = 0;

      const now = Date.now();

      while (_apiTimestamps.length > 0 && _apiTimestamps[0] < cutoff) {
        _apiTimestamps.shift();

      if (_apiTimestamps.length >= CONFIG.RATE_LIMIT) {
        const wait = _apiTimestamps[0] + CONFIG.RATE_WINDOW - now + 10;
        await new Promise(r => setTimeout(r, wait));
        continue;

        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), CONFIG.FETCH_TIMEOUT);
        try {
          res = await fetch(url, { signal: controller.signal });
        } finally {
          clearTimeout(timer);

        if (retries < MAX_RETRIES) {
          retries++;
          const delay = Math.min(1000 * Math.pow(2, retries - 1), 30000);
          console.warn(`fetchJson: network error for ${url}, retry ${retries}/${MAX_RETRIES} in ${delay}ms`);
          await new Promise(r => setTimeout(r, delay));
          continue;
        }
        throw err;

      if (res.ok) {
        incApiCalls(1);
        return res.json();

      if ((res.status === 429 || res.status >= 500) && retries < MAX_RETRIES) {
        retries++;

          const ra = res.headers.get('Retry-After');
          delay = ra ? parseInt(ra, 10) * 1000 : Math.min(1000 * Math.pow(2, retries - 1), 30000);
        } else {
          delay = Math.min(1000 * Math.pow(2, retries - 1), 30000);

      }
      incApiCalls(1);
      throw new Error(`HTTP ${res.status}`);
    }

  promise.finally(() => {
    if (_inflightFetches.get(url) === promise) _inflightFetches.delete(url);

}

// Same-author fine-tunes appear at L2 alongside true base models, since users

// Iteratively strip trailing -segments from a model ID until a known parent is found.
// Handles patterns like Qwen2.5-7B-AWQ → Qwen2.5-7B, or Qwen3-Coder-Next-GGUF → Qwen3-Coder-Next.
function inferParent(modelId, knownIds) {
  const bits = modelId.split('/');

    const dash = name.lastIndexOf('-');

    name = name.substring(0, dash);

    if (knownIds.has(candId)) return candId;

  return null;
}

// Quant model without explicit base_model metadata, but whose parent is in knownIds.

// so a parent outside the date range still suppresses the quant from appearing standalone at L1.

  const cd = model.cardData;

  const idLower = model.id.toLowerCase();
  if (!Q_METHODS.some(t => idLower.includes(t))) return false;
  return inferParent(model.id, knownIds) !== null;
}

function getOrphanQuantMethod(modelId) {
  const idLower = modelId.toLowerCase();

  const cd = m.cardData;

    const chip = document.createElement("span");
    chip.className = "filter-chip " + (activeSet.has(opt) ? "active" : "inactive");
    chip.dataset.option = opt;
    chip.textContent = opt.charAt(0).toUpperCase() + opt.slice(1);
    chip.tabIndex = 0;
    chip.role = "button";
    chip.setAttribute("aria-pressed", String(activeSet.has(opt)));
    chip.addEventListener("click", () => {
      clickHandler(opt);
      syncFilterChips();
      markDirty();
    });
    chip.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); chip.click(); }
    });
    bar.appendChild(chip);
  });
}
function reseedActiveTaskFilters() {
  const tasks = resolveTasks();
  const resolvedSet = new Set(tasks);
  for (const tag of activeTaskFilters) {
    if (!resolvedSet.has(tag)) activeTaskFilters.delete(tag);
  }
  tasks.forEach(t => {
    if (DEFAULT_ACTIVE_TAGS.has(t)) activeTaskFilters.add(t);
  });
}
function applyFromLogic(option) {
  applyBarLogic(option, FROM_OPTIONS, activeFromFilters);
  reseedActiveTaskFilters();
}
function applyToLogic(option) {
  applyBarLogic(option, TO_OPTIONS, activeToFilters);
  reseedActiveTaskFilters();
}
function applyBarLogic(option, options, activeSet) {
  const wasEnabled = activeSet.has(option);
  const enabledCount = options.filter(o => activeSet.has(o)).length;
  if (option === "all") {
    if (!wasEnabled) {
      options.forEach(o => activeSet.add(o));
    } else {
      activeSet.delete("all");
    }
  } else if (!wasEnabled) {
    activeSet.add(option);
  } else if (enabledCount === options.length) {
    options.forEach(o => activeSet.delete(o));
    activeSet.add(option);
  } else if (enabledCount === 1) {
    options.forEach(o => activeSet.add(o));
  } else {
    activeSet.delete(option);
  }
}

function sortCoerce(v, k) {
  if (["downloads", "likes", "totalDownloads", "totalLikes", "count", "paramB"].includes(k)) return Number(v);
  if (["created_at", "updated_at", "lastModified"].includes(k)) return new Date(v || 0).getTime();
  return String(v || "").toLowerCase();
}
function sortRows(rows, key, asc, subKey) {
  return rows.slice().sort((a, b) => {
    let cmp = 0;
    if (subKey && a[key] != null && b[key] != null && a[key] === b[key]) {
      const sa = sortCoerce(a[subKey], subKey);
      const sb = sortCoerce(b[subKey], subKey);
      if (sa < sb) return -1;
      if (sa > sb) return 1;
      cmp = 0;
    } else {
      let va = sortCoerce(a[key], key), vb = sortCoerce(b[key], key);
      if (va < vb) cmp = -1;
      else if (va > vb) cmp = 1;
      else cmp = 0;
    }
    return asc ? cmp : -cmp;
  });
}

// ── Level 1: Authors ──
function renderMain(authorData) {
  const tbody = document.getElementById("body");
  let sorted = sortRows(authorData, sortKey, sortAsc, sortKey === "author" ? undefined : "author");
  if (_l1AuthorFilter) {
    const f = _l1AuthorFilter.toLowerCase();
    sorted = [...sorted].sort((a, b) => {
      const aMatch = a.author.toLowerCase().includes(f);
      const bMatch = b.author.toLowerCase().includes(f);
      if (aMatch && !bMatch) return -1;
      if (!aMatch && bMatch) return 1;
      return 0;
    });
  }

  // Optimized: Use map + join to create the HTML string in one pass
  const html = sorted.map((a, idx) => {
    const zebra = idx % 2 === 0 ? "row-even" : "row-odd";
    return `<tr class="l1-row ${zebra}" data-l1-idx="${idx}" data-author="${escapeHtml(a.author)}">
      <td><span class="toggle" id="t1-${idx}">▶</span><a href="https://huggingface.co/${escapeHtml(a.author)}" target="_blank" rel="noopener noreferrer">${escapeHtml(a.author)}</a></td>
      <td class="right">${a.count}</td>
      <td class="right">${fmt(a.totalDownloads)}</td>
      <td class="right">${fmt(a.totalLikes)}</td>
    </tr>
    <tr class="detail-row" id="d1-${idx}" style="display:none"><td colspan="4"><div class="detail-inner" id="i1-${idx}"></div></td></tr>`;
  }).join('');

  tbody.innerHTML = html;
  document.getElementById("count").textContent =
    `${sorted.length} authors with base models in selected range. Click to expand.`;
}

async function loadAuthorModels(idx, author, container) {
  const gen = _fetchGeneration;
  try {
    const models = cacheAccess(author + "_models") || await fetchJson(
      `https://huggingface.co/api/models?author=${author}&sort=downloads&direction=-1&limit=${CONFIG.AUTHOR_LIMIT}&full=true&cardData=true`
    );
    if (!cacheAccess(author + "_models")) cacheSet(author + "_models", models);

    const authorKnownIds = new Set(models.map(x => x.id));
    const baseModels = models.filter(m => isBase(m)).map(m => ({
      id: m.id,
      downloads: m.downloads || 0,
      likes: m.likes || 0,
      created_at: m.createdAt || "",
      updated_at: m.lastModified || "",
      lastModified: m.lastModified || "",
      tags: m.tags || [],
      paramB: getParamCount(m),
      pipeline_tag: m.pipeline_tag || "",
      _orphanQuant: isOrphanQuant(m, authorKnownIds),
      _nestedQuant: m.cardData && m.cardData.base_model ? (() => {
          const idLower = m.id.toLowerCase();
          if (!Q_METHODS.some(t => idLower.includes(t))) return false;
          const bm = Array.isArray(m.cardData.base_model) ? m.cardData.base_model[0] : m.cardData.base_model;
          return authorKnownIds.has(bm);
        })() : false
    }));

    cacheSet(author, baseModels);

    const nonQuantBase = baseModels.filter(m => !m._orphanQuant && !m._nestedQuant);
    const filterApplied = () => nonQuantBase.filter(m => modelPassesAllFilters(m));

    const dated = filterApplied();

    if (gen !== _fetchGeneration) return;
    const ad = _authorData;
    for (const a of ad) {
      if (a.author === author) {
        a.count = dated.length;
        a.totalDownloads = dated.reduce((s, m) => s + m.downloads, 0);
        a.totalLikes = dated.reduce((s, m) => s + m.likes, 0);
        break;
      }
    }
    const row = document.querySelector(`.l1-row[data-author="${author}"]`);
    if (row) {
      const cells = row.querySelectorAll("td");
      cells[1].textContent = dated.length;
      cells[2].textContent = fmt(dated.reduce((s, m) => s + m.downloads, 0));
      cells[3].textContent = fmt(dated.reduce((s, m) => s + m.likes, 0));
    }

    if (gen !== _fetchGeneration) return;
    renderL2(idx, author, dated, container, nonQuantBase.length);

    const unknownModels = dated.filter(m => m.paramB === null);
    if (unknownModels.length > 0) {
      const statusEl = document.getElementById("status");
      const totalUnk = unknownModels.length;
      for (let i = 0; i < totalUnk; i += CONFIG.PARAM_BATCH_SIZE) {
        const batch = unknownModels.slice(i, i + CONFIG.PARAM_BATCH_SIZE);
        statusEl.textContent = `Resolving parameters for ${author}… (${Math.min(i + CONFIG.PARAM_BATCH_SIZE, totalUnk)}/${totalUnk})`;
        await Promise.all(batch.map(async (m) => {
          try {
            const full = await fetchJson(`https://huggingface.co/api/models/${m.id}?full=true`);
            const p = getParamCount(full);
            if (p !== null) m.paramB = p;
          } catch (e) {
            console.warn("Failed to fetch param for", m.id, e);
          }
        }));
        if (gen !== _fetchGeneration) return;
        const pruned = filterApplied();
        const detailRow = document.getElementById(`d1-${idx}`);
        if (detailRow && detailRow.style.display !== "none") {
          renderL2(idx, author, pruned, container, nonQuantBase.length);
        }
      }
      for (const m of unknownModels) {
        if (m.paramB != null) continue;
        const bits = m.id.split('/');
        let name = bits[1];
        while (name.length > 0) {
          const dash = name.lastIndexOf('-');
          if (dash <= 0) break;
          name = name.substring(0, dash);
          const candId = bits[0] + '/' + name;
          const parent = baseModels.find(b => b.id === candId && b.paramB != null) ||
            (_allFetched || []).find(f => f.id === candId && f.paramB != null);
          if (parent) { m.paramB = parent.paramB; break; }
        }
      }
      if (gen !== _fetchGeneration) return;
      statusEl.textContent = "";
      const updated = filterApplied();
      const detailRow = document.getElementById(`d1-${idx}`);
      if (detailRow && detailRow.style.display !== "none") {
        renderL2(idx, author, updated, container, nonQuantBase.length);
      }
    }
  } catch (err) {
    container.innerHTML = `<div class="detail-error">Error: ${err.message}</div>`;
  }
}

// ── Level 2: Base Models ──
function thHtml(c, state, level) {
  const isSorted = state.key === c.key;
  const allCls = (c.headerCls || "") + " " + (c.cls || "");
  const cls = allCls.trim() + (isSorted ? " sorted" : "");
  const arrow = isSorted ? (state.asc ? "▲" : "▼") : "";
  const ariaSort = isSorted ? ` aria-sort="${state.asc ? "ascending" : "descending"}"` : "";
  if (allCls.includes("right") || allCls.includes("center") || allCls.includes("updated-header")) {
    return `<th data-key="${c.key}" data-level="${level}" class="${cls}" scope="col"${ariaSort}><span class="arrow-left">${arrow}</span>${c.label}</th>`;
  }
  return `<th data-key="${c.key}" data-level="${level}" class="${cls}" scope="col"${ariaSort}>${c.label}<span class="arrow">${arrow}</span></th>`;
}

function renderL2(idx, author, models, container, totalBeforeFilter) {
  const state = detailSort[`l2-${author}`] || { key: "downloads", asc: false };
  const sorted = sortRows(models, state.key, state.asc, state.key === "id" ? undefined : "id");

  const cols = [
    { key: "id", label: "Model ID" },
    { key: "paramB", label: "Params", headerCls: "updated-header", cls: "center", width: 160 },
    { key: "downloads", label: "Downloads", cls: "right", width: 110 },
    { key: "likes", label: "Likes", cls: "right", width: 80 },
    { key: "lastModified", label: "Updated", cls: "updated-cell", headerCls: "updated-header", width: 135 }
  ];

  let html = `<table><colgroup>${cols.map(c => `<col${c.width ? ` width="${c.width}"` : ''}>`).join('')}</colgroup><thead><tr>`;
  cols.forEach(c => { html += thHtml(c, state, "2"); });
  html += `</tr></thead><tbody>`;

  sorted.forEach((m, mIdx) => {
    const qMethods = getOrphanQuantMethod(m.id);
    const orphanBadge = qMethods.length ? qMethods.map(m => `<span class="badge orphan" title="Parent base model filtered out">${escapeHtml(m.toUpperCase())}</span>`).join(' ') + ' ' : '';
    html += `<tr class="l2-row" data-l2-idx="${idx}" data-model-idx="${mIdx}" data-model="${escapeHtml(m.id)}">
      <td class="model-id-cell"><span class="toggle" id="t2-${idx}-${mIdx}">▶</span>${orphanBadge}<a href="https://huggingface.co/${escapeHtml(m.id)}" target="_blank" rel="noopener noreferrer" title="${escapeHtml(m.id.split("/").slice(1).join("/"))}">${escapeHtml(m.id.split("/").slice(1).join("/"))}</a></td>
      <td class="center" style="font-size:0.78rem">${m.paramB != null ? paramValueToLabel(m.paramB) : "—"}</td>
      <td class="right">${fmt(m.downloads)}</td>
      <td class="right">${fmt(m.likes)}<span class="likes-icon">♥</span></td>
      <td class="updated-cell">${fmtDate(m.lastModified)} <span style="color:#484f58;font-size:0.75rem">(${fmtAge(m.lastModified)})</span></td>
    </tr>
    <tr class="detail-row" id="d2-${idx}-${mIdx}" style="display:none"><td colspan="5"><div class="detail-inner" id="i2-${idx}-${mIdx}"></div></td></tr>`;
  });

  const hidden = (totalBeforeFilter != null && totalBeforeFilter > models.length) ? totalBeforeFilter - models.length : 0;
  html += `</tbody></table><div class="detail-count">${models.length} model(s)` + (hidden > 0 ? `, <span style="color:#484f58;font-size:0.75rem">+${hidden} hidden by search settings</span>` : '') + `</div>`;
  // innerHTML: deliberate choice. Containers are small (10-200 rows at most) and
  // all event listeners use delegation (_delegatedL2/3/4 flags). createElement would
  // add ~3x code with zero measurable perf difference at this scale.
  container.innerHTML = html;
  container._l2State = { idx, author, models, totalBeforeFilter };

  if (!container._delegatedL2) {
    // Event delegation: one listener per container survives innerHTML re-renders.
    // Flag ensures we only attach once even if renderL2 is called multiple times.
    container._delegatedL2 = true;
    container.addEventListener("click", function(e) {
      const inner = e.target.closest(".detail-inner");
      if (inner && inner !== this) return;
      const s = this._l2State;
      const th = e.target.closest("thead th");
      if (th) {
        if (th.dataset.level !== "2") return;
        const key = th.dataset.key;
        const st = detailSort[`l2-${s.author}`] || { key: "downloads", asc: false };
        if (st.key === key) st.asc = !st.asc;
        else { st.key = key; st.asc = false; }
        detailSort[`l2-${s.author}`] = st;
        renderL2(s.idx, s.author, s.models, this, s.totalBeforeFilter);
        return;
      }
      const tr = e.target.closest("tr.l2-row");
      if (tr && e.target.tagName !== "A") {
        const l2Idx = parseInt(tr.dataset.l2Idx);
        const modelIdx = parseInt(tr.dataset.modelIdx);
        const modelId = tr.dataset.model;
        const detailRow = document.getElementById(`d2-${l2Idx}-${modelIdx}`);
        const inner = document.getElementById(`i2-${l2Idx}-${modelIdx}`);
        const tog = document.getElementById(`t2-${l2Idx}-${modelIdx}`);
        const modelKey = `m|${modelId}`;
        if (detailRow.style.display === "none") {
          detailRow.style.display = "";
          tog.classList.add("open");
          expandedSections.add(modelKey);
          const key = `children-${modelId}`;
          const cached = cacheAccess(key);
          if (cached) {
            renderL3(l2Idx, modelIdx, modelId, cached, inner);
          } else {
            inner.innerHTML = '<div class="detail-loading">Fetching children/quantizations…</div>';
            loadChildren(l2Idx, modelIdx, modelId, inner);
          }
        } else {
          detailRow.style.display = "none";
          tog.classList.remove("open");
          expandedSections.delete(modelKey);
          for (const k of [...expandedSections]) {
            if (k.startsWith(`g|${modelId}|`)) expandedSections.delete(k);
          }
        }
      }
    });
  }
}

// Two-phase search: first try model name alone (covers quant suffixes), fall back to
// full parent ID. strictNameMatch strips known quant suffixes from candidate IDs
// before comparing, so Qwen2.5-7B-GGUF matches a search for "Qwen2.5-7B".
// Same-author fine-tunes are skipped (already shown at L2).
// Cross-author fine-tunes without explicit base_model are only included if they pass the
// active task filter and aren't already in _allFetched (avoids duplicating base models
// that happen to be surfaced by the search endpoint).
async function loadChildren(l2Idx, modelIdx, parentId, container) {
  const cacheKey = `children-${parentId}`;

  // Deduplicate concurrent fetches for the same parent
  if (_inflightChildren.has(cacheKey)) {
    await _inflightChildren.get(cacheKey);
    const cached = cacheAccess(cacheKey);
    if (cached) renderL3(l2Idx, modelIdx, parentId, cached, container);
    return;
  }

  const promise = (async () => {
    try {
      const modelName = parentId.split("/").slice(1).join("/");
      const results = [];
      const seen = new Set();

      const strictNameMatch = (candidateId) => {
        let name = candidateId.split("/").slice(1).join("/");
        let changed;
        do {
          changed = false;
          for (const q of Q_METHODS) {
            const suffix = '-' + q;
            if (name.toLowerCase().endsWith(suffix)) {
              name = name.slice(0, -suffix.length);
              changed = true;
              break;
            }
          }
        } while (changed);
        return name.toLowerCase() === modelName.toLowerCase();
      };

      const processChildren = (models) => {
        let count = 0;
        for (const m of models) {
          if (m.id === parentId || seen.has(m.id)) continue;
          seen.add(m.id);

          const cd = m.cardData || {};
          const baseModel = cd.base_model;
          const idLower = m.id.toLowerCase();
          const tagsStr = (m.tags || []).join(" ").toLowerCase();
          const isQuant = Q_METHODS.some(t => idLower.includes(t) || tagsStr.includes(t));
          const hasBaseModel = baseModel === parentId ||
                               Array.isArray(baseModel) && baseModel.some(b => b === parentId);
          const childAuthor = m.id.split("/")[0];
          const parentAuthor = parentId.split("/")[0];
          if (childAuthor === parentAuthor) continue;

          if (hasBaseModel || (strictNameMatch(m.id) && isQuant)) {
              if (!hasBaseModel) {
                if (m.pipeline_tag && !activeTaskFilters.has(m.pipeline_tag)) continue;
                if (_allFetched && _allFetched.some(f => f.id === m.id)) continue;
              }
              const qMethods = Q_METHODS.filter(t => idLower.includes(t) || tagsStr.includes(t));
              let qMethod = qMethods.length ? qMethods.join(", ") : (hasBaseModel ? "finetune" : (tagsStr.includes("safetensors") ? "safetensors" : "derivative"));
              results.push({
              id: m.id,
              author: m.id.split("/")[0],
              downloads: m.downloads || 0,
              likes: m.likes || 0,
              created_at: m.createdAt || "",
              updated_at: m.lastModified || "",
              lastModified: m.lastModified || "",
              q_method: qMethod,
              tags: m.tags || []
            });
            count++;
          }
        }
        return count;
      };

      const nameUrl = `https://huggingface.co/api/models?search=${encodeURIComponent(modelName)}&sort=downloads&direction=-1&limit=${CONFIG.CHILD_LIMIT}&full=true&cardData=true`;
      let childCount = processChildren(await fetchJson(nameUrl));

      if (childCount === 0) {
        const fullUrl = `https://huggingface.co/api/models?search=${encodeURIComponent(parentId)}&sort=downloads&direction=-1&limit=${CONFIG.CHILD_LIMIT}&full=true&cardData=true`;
        processChildren(await fetchJson(fullUrl));
      }

      cacheSet(cacheKey, results);
      renderL3(l2Idx, modelIdx, parentId, results, container);
    } catch (err) {
      container.innerHTML = `<div class="detail-error">Error: ${err.message}</div>`;
    }
  })();

  _inflightChildren.set(cacheKey, promise);
  await promise;
  _inflightChildren.delete(cacheKey);
}

// ── Level 3: Quant Author Groups ──
function renderL3(l2Idx, modelIdx, parentId, children, container) {
  const filtered = children.filter(c => matchesFilter(c.q_method) && isInDateRange(c.lastModified));
  const groups = {};
  filtered.forEach(c => {
    if (!groups[c.author]) groups[c.author] = [];
    groups[c.author].push(c);
  });

  const groupEntries = Object.entries(groups).map(([author, quants]) => ({
    author,
    count: quants.length,
    totalDownloads: quants.reduce((s, q) => s + q.downloads, 0),
    quants
  })).filter(g => !_l3AuthorFilter || g.author.toLowerCase().includes(_l3AuthorFilter.toLowerCase()));

  const state = detailSort[`l3-${parentId}`] || { key: "totalDownloads", asc: false };
  const sorted = sortRows(groupEntries, state.key, state.asc, state.key === "author" ? undefined : "author");

  const cols = [
    { key: "author", label: "Quant Author" },
    { key: "count", label: "Models", cls: "right", width: 75 },
    { key: "totalDownloads", label: "Downloads", cls: "right", width: 120 }
  ];

  let html = `<table><colgroup>${cols.map(c => `<col${c.width ? ` width="${c.width}"` : ''}>`).join('')}</colgroup><thead><tr>`;
  cols.forEach(c => { html += thHtml(c, state, "3"); });
  html += `</tr></thead><tbody>`;

  sorted.forEach((g, gIdx) => {
    html += `<tr class="l3-row" data-l3-l2="${l2Idx}" data-l3-model-idx="${modelIdx}" data-l3-parent="${escapeHtml(parentId)}" data-l3-idx="${gIdx}" data-l3-author="${escapeHtml(g.author)}">
      <td><span class="toggle" id="t3-${l2Idx}-${modelIdx}-${gIdx}">▶</span><a href="https://huggingface.co/${escapeHtml(g.author)}" target="_blank" rel="noopener noreferrer">${escapeHtml(g.author)}</a></td>
      <td class="models-cell">${g.count}</td>
      <td class="right">${fmt(g.totalDownloads)}</td>
    </tr>
    <tr class="detail-row" id="d3-${l2Idx}-${modelIdx}-${gIdx}" style="display:none"><td colspan="3"><div class="detail-inner" id="i3-${l2Idx}-${modelIdx}-${gIdx}"></div></td></tr>`;
  });
  html += `</tbody></table>`;
  html += `<div class="detail-count">${filtered.length} child model(s) from ${groupEntries.length} author(s)${filtered.length !== children.length ? ` (filtered from ${children.length})` : ''}</div>`;
  container.innerHTML = html;
  container._l3State = { l2Idx, modelIdx, parentId, children };

  if (!container._delegatedL3) {
    // Event delegation: same rationale as L2 — survives innerHTML re-renders.
    container._delegatedL3 = true;
    container.addEventListener("click", function(e) {
      const inner = e.target.closest(".detail-inner");
      if (inner && inner !== this) return;
      const s = this._l3State;
      const th = e.target.closest("thead th");
      if (th) {
        if (th.dataset.level !== "3") return;
        const key = th.dataset.key;
        if (!key) return;
        const st = detailSort[`l3-${s.parentId}`] || { key: "totalDownloads", asc: false };
        if (st.key === key) st.asc = !st.asc;
        else { st.key = key; st.asc = false; }
        detailSort[`l3-${s.parentId}`] = st;
        renderL3(s.l2Idx, s.modelIdx, s.parentId, s.children, this);
        return;
      }
      const tr = e.target.closest("tr.l3-row");
      if (tr && e.target.tagName !== "A") {
        const l2Idx = parseInt(tr.dataset.l3L2);
        const modelIdx = parseInt(tr.dataset.l3ModelIdx);
        const parentId = tr.dataset.l3Parent;
        const gIdx = parseInt(tr.dataset.l3Idx);
        const author = tr.dataset.l3Author;
        const detailRow = document.getElementById(`d3-${l2Idx}-${modelIdx}-${gIdx}`);
        const inner = document.getElementById(`i3-${l2Idx}-${modelIdx}-${gIdx}`);
        const tog = document.getElementById(`t3-${l2Idx}-${modelIdx}-${gIdx}`);
        const groupKey = `g|${parentId}|${author}`;
        if (detailRow.style.display === "none") {
          detailRow.style.display = "";
          tog.classList.add("open");
          expandedSections.add(groupKey);
          const allChildren = cacheAccess(`children-${parentId}`) || [];
          const quants = allChildren.filter(c => c.author === author && matchesFilter(c.q_method) && isInDateRange(c.lastModified));
          renderL4(l2Idx, modelIdx, gIdx, parentId, author, quants, inner);
        } else {
          detailRow.style.display = "none";
          tog.classList.remove("open");
          expandedSections.delete(groupKey);
        }
      }
    });
  }
}

// ── Level 4: Individual Quantizations ──
function renderL4(l2Idx, modelIdx, gIdx, parentId, author, quants, container) {
  const st = detailSort[`l4-${parentId}-${author}`] || { key: "downloads", asc: false };
  if (_l4ModelFilter) quants = quants.filter(q => q.id.split("/").slice(1).join("/").toLowerCase().includes(_l4ModelFilter.toLowerCase()));
  const sorted = sortRows(quants, st.key, st.asc, st.key === "id" ? undefined : "id");

  const cols = [
    { key: "id", label: "Model ID" },
    { key: "q_method", label: "Quant", headerCls: "updated-header", cls: "center", width: 160 },
    { key: "downloads", label: "Downloads", cls: "right", width: 110 },
    { key: "likes", label: "Likes", cls: "right", width: 80 },
    { key: "lastModified", label: "Updated", cls: "right", width: 110 }
  ];

  let html = `<table><colgroup>${cols.map(c => `<col${c.width ? ` width="${c.width}"` : ''}>`).join('')}</colgroup><thead><tr>`;
  cols.forEach(c => { html += thHtml(c, st, "4"); });
  html += `</tr></thead><tbody>`;

  sorted.forEach(q => {
    html += `<tr class="l4-row">
      <td class="model-id-cell"><a href="https://huggingface.co/${escapeHtml(q.id)}" target="_blank" rel="noopener noreferrer" title="${escapeHtml(q.id.split("/").slice(1).join("/"))}">${escapeHtml(q.id.split("/").slice(1).join("/"))}</a></td>
      <td class="center"><span class="badge ${q.q_method === 'derivative' || q.q_method === 'finetune' ? 'deriv' : ''}">${escapeHtml(q.q_method)}</span></td>
      <td class="right">${fmt(q.downloads)}</td>
      <td class="right">${fmt(q.likes)}<span class="likes-icon">♥</span></td>
      <td class="right">${fmtDate(q.lastModified)}</td>
    </tr>`;
  });

  html += `</tbody></table>`;
  container.innerHTML = html;
  container._l4State = { l2Idx, modelIdx, gIdx, parentId, author, quants };

  if (!container._delegatedL4) {
    // Event delegation: same rationale as L2/L3.
    container._delegatedL4 = true;
    container.addEventListener("click", function(e) {
      const th = e.target.closest("thead th");
      if (!th || th.dataset.level !== "4") return;
      const s = this._l4State;
      const key = th.dataset.key;
      const st = detailSort[`l4-${s.parentId}-${s.author}`] || { key: "downloads", asc: false };
      if (st.key === key) st.asc = !st.asc;
      else { st.key = key; st.asc = false; }
      detailSort[`l4-${s.parentId}-${s.author}`] = st;
      renderL4(s.l2Idx, s.modelIdx, s.gIdx, s.parentId, s.author, s.quants, this);
    });
  }
}

// Re-renders all currently-open sections after filter/slider changes.
// Three phases because L1 must exist before L2 can be found inside it, etc.
// expandedSections keys use stable identifiers (a|author, m|modelId, g|parentId|author)
// so restoration is robust even if DOM indices shift after re-render.
function refreshAllExpanded() {
  // Phase 1: re-expand L1 author rows
  for (const key of expandedSections) {
    if (!key.startsWith("a|")) continue;
    const author = key.slice(2);
    const trs = document.querySelectorAll("tr.l1-row");
    let row, idx;
    for (const r of trs) {
      if (r.dataset.author === author) { row = r; idx = parseInt(r.dataset.l1Idx); break; }
    }
    if (!row) continue;
    const detailRow = document.getElementById(`d1-${idx}`);
    const inner = document.getElementById(`i1-${idx}`);
    const tog = document.getElementById(`t1-${idx}`);
    if (!detailRow || detailRow.style.display !== "none") continue;
    detailRow.style.display = "";
    if (tog) tog.classList.add("open");
    const models = cacheAccess(author);
    if (models) {
     const nonQuantBase = models.filter(m => !m._orphanQuant && !m._nestedQuant);
      const filtered = nonQuantBase.filter(m => modelPassesAllFilters(m));
      renderL2(idx, author, filtered, inner, nonQuantBase.length);
    }
  }

  // Phase 2: re-expand L2 model rows
  for (const key of expandedSections) {
    if (!key.startsWith("m|")) continue;
    const modelId = key.slice(2);
    const trs = document.querySelectorAll("tr.l2-row");
    let row, l2Idx, modelIdx;
    for (const r of trs) {
      if (r.dataset.model === modelId) { row = r; l2Idx = parseInt(r.dataset.l2Idx); modelIdx = parseInt(r.dataset.modelIdx); break; }
    }
    if (!row || !row.closest(".detail-inner")) continue;
    const detailRow = document.getElementById(`d2-${l2Idx}-${modelIdx}`);
    const inner = document.getElementById(`i2-${l2Idx}-${modelIdx}`);
    const tog = document.getElementById(`t2-${l2Idx}-${modelIdx}`);
    if (!detailRow || detailRow.style.display !== "none") continue;
    detailRow.style.display = "";
    if (tog) tog.classList.add("open");
    const children = cacheAccess(`children-${modelId}`);
    if (children) {
      renderL3(l2Idx, modelIdx, modelId, children, inner);
    }
  }

  // Phase 3: re-expand L3 quant author group rows
  for (const key of expandedSections) {
    if (!key.startsWith("g|")) continue;
    const parts = key.split("|");
    const modelId = parts[1];
    const groupAuthor = parts.slice(2).join("|");
    const trs = document.querySelectorAll("tr.l3-row");
    let row, l2Idx, modelIdx, gIdx;
    for (const r of trs) {
      if (r.dataset.l3Parent === modelId && r.dataset.l3Author === groupAuthor) {
        row = r; l2Idx = parseInt(r.dataset.l3L2); modelIdx = parseInt(r.dataset.l3ModelIdx); gIdx = parseInt(r.dataset.l3Idx);
        break;
      }
    }
    if (!row || !row.closest(".detail-inner")) continue;
    const detailRow = document.getElementById(`d3-${l2Idx}-${modelIdx}-${gIdx}`);
    const inner = document.getElementById(`i3-${l2Idx}-${modelIdx}-${gIdx}`);
    const tog = document.getElementById(`t3-${l2Idx}-${modelIdx}-${gIdx}`);
    if (!detailRow || detailRow.style.display !== "none") continue;
    detailRow.style.display = "";
    if (tog) tog.classList.add("open");
    const allChildren = cacheAccess(`children-${modelId}`) || [];
    const quants = allChildren.filter(c => c.author === groupAuthor && matchesFilter(c.q_method) && isInDateRange(c.lastModified));
    renderL4(l2Idx, modelIdx, gIdx, modelId, groupAuthor, quants, inner);
  }
}

// Main action: (1) increment generation to abort stale work, (2) fetch new pipeline tasks
// and untagged models, (3) inject cross-author base models, (4) trim _allFetched to 16k,
// (5) compute author data and render. If all tasks are already fetched, skips to (5).
// The "Refresh" button on subsequent clicks re-checks — filters alone (no new task data)
// just recompute from _allFetched via computeAuthorData.
function applyFilters() {
  if (!needsUpdate) return;
  needsUpdate = false;
  const savedExpansions = new Set(expandedSections);
  _fetchGeneration++;
  const gen = _fetchGeneration;
  const btn = document.getElementById("get-results-btn");
  btn.classList.remove("ready");
  btn.classList.add("disabled");
  const tasks = resolveTasks().filter(t => activeTaskFilters.has(t));
  const newTasks = tasks.filter(t => !fetchedTasks.has(t));
  const needUntagged = activeSpecialFilters.has("include untagged") && !fetchedUntagged;
  if (newTasks.length > 0 || needUntagged) {
    (async () => {
      try {
        const status = document.getElementById("status");
        status.textContent = `Fetching models…`;
        let fresh = [];
        if (newTasks.length > 0) {
          fresh = await fetchTasks(newTasks);
        }
        if (gen !== _fetchGeneration) return;
        if (needUntagged) {
          const raw = await fetchUntaggedModels();
          fresh = fresh.concat(raw.filter(m => !m.pipeline_tag));
          fetchedUntagged = true;
        }
        if (gen !== _fetchGeneration) return;
        const seen = new Set((_allFetched || []).map(m => m.id));
        const all = [...(_allFetched || [])];
        for (const m of fresh) {
          if (!seen.has(m.id)) {
            seen.add(m.id);
            all.push(m);
          }
        }
        _allFetched = all;
        _authorData = computeAuthorData();
        renderMain(_authorData);
        updateArrows();
        pruneExpiredExpansions();
        saveRestoreExpansions(savedExpansions);
        refreshAllExpanded();
        status.textContent = `Rendered ${_authorData.length} authors, resolving base models…`;
        try {
          await injectBaseModels(all, () => {
            if (gen !== _fetchGeneration) return;
            const saved = new Set(expandedSections);
            _authorData = computeAuthorData();
            renderMain(_authorData);
            updateArrows();
            pruneExpiredExpansions();
            saveRestoreExpansions(saved);
            refreshAllExpanded();
          });
        } catch (e) {
          console.warn("Base model injection error:", e);
        }
        if (gen !== _fetchGeneration) return;
        if (all.length > CONFIG.ALL_FETCHED_MAX) {
          // Keep the most recently-modified models, drop the rest. This caps memory at
          // ~80-160MB (5-10KB/model × 16k) rather than unbounded growth from repeated
          // fetches. Oldest-by-date is safe because users filter by date range anyway.
          all.sort((a, b) => {
            const da = a.lastModified ? new Date(a.lastModified).getTime() : 0;
            const db = b.lastModified ? new Date(b.lastModified).getTime() : 0;
            return db - da;
          });
          all.length = CONFIG.ALL_FETCHED_MAX;
        }
        status.textContent = "";
        _authorData = computeAuthorData();
        renderMain(_authorData);
        updateArrows();
        pruneExpiredExpansions();
        saveRestoreExpansions(savedExpansions);
        refreshAllExpanded();
      } catch (e) {
        console.warn("applyFilters error:", e);
        document.getElementById("status").textContent = "Error: " + e.message;
      } finally {
        btn.classList.remove("disabled");
        btn.textContent = "Refresh";
      }
    })();
  } else {
    document.getElementById("get-results-btn").textContent = "Refresh";
    document.getElementById("get-results-btn").classList.remove("disabled");
    _authorData = computeAuthorData();
    renderMain(_authorData);
    updateArrows();
    pruneExpiredExpansions();
    saveRestoreExpansions(savedExpansions);
    refreshAllExpanded();
  }
}

// ── Init ──
// Fetch top models per pipeline tag (by downloads + by lastModified, merged + deduped).
// Concurrency capped at 5 to avoid saturating the browser's connection pool.
async function fetchTasks(tasks) {
  const status = document.getElementById("status");
  const seen = new Set();
  const allFetched = [];
  const CONCURRENCY = 5; // stays under browser per-domain connection limit (typically 6-8)
  for (let start = 0; start < tasks.length; start += CONCURRENCY) {
    const batch = tasks.slice(start, start + CONCURRENCY);
    status.textContent = `Fetching ${batch.join(", ")}… (${Math.min(start + CONCURRENCY, tasks.length)}/${tasks.length})`;
    const results = await Promise.allSettled(batch.map(async tag => {
      const downloadsModels = await fetchModels(tag);
      const recentModels = await fetchRecentModels(tag);
      return { tag, combined: [...downloadsModels, ...recentModels] };
    }));
    for (const r of results) {
      if (r.status === "rejected") {
        console.warn("fetchTasks: task failed", r.reason);
        continue;
      }
      const { tag, combined } = r.value;
      for (const m of combined) {
        if (seen.has(m.id)) continue;
        seen.add(m.id);
        m.paramB = getParamCount(m);
        if (!m.pipeline_tag) m.pipeline_tag = tag;
        allFetched.push(m);
      }
      fetchedTasks.add(tag);
    }
  }
  return allFetched;
}

// Two-pass base model injection.
// Pass 1: scan all date-range models, identify parent IDs that aren't yet in _allFetched.
//   Marks existing parents as _injected so they bypass the date filter (a parent outside
//   the date range still needs to remain visible so its child quant models are reachable).
// Pass 2: fetch unknown parents in batches (INJECTION_BATCH_SIZE), call onBatch() after
//   each batch for incremental re-render. all.push(...injected) only after all batches
//   complete — the initial for-loop iterates all.length which is never mutated during
//   the scan, so there is no infinite loop risk.
async function injectBaseModels(all, onBatch) {
  const gen = _fetchGeneration;
  if (gen !== _fetchGeneration) return;
  _injectedBaseIds.clear();
  const seen = new Set(all.map(m => m.id));
  const seenAuthors = new Set(all.map(m => m.id.split("/")[0]));
  const status = document.getElementById("status");
  const injected = [];
  const fetchQueue = new Map();

  for (let i = 0; i < all.length; i++) {
    if (gen !== _fetchGeneration) return;
    const m = all[i];
    if (!isInDateRange(m.lastModified)) continue;

    let baseId = null;
    const cd = m.cardData;
    const bm = cd && cd.base_model;

    if (bm) {
      baseId = Array.isArray(bm) ? bm[0] : bm;
    } else {
      const idLower = m.id.toLowerCase();
      if (!Q_METHODS.some(t => idLower.includes(t))) continue;
      const bits = m.id.split('/');
      let name = bits[1];
      while (name.length > 0) {
        const dash = name.lastIndexOf('-');
        if (dash <= 0) break;
        name = name.substring(0, dash);
        const candId = bits[0] + '/' + name;
        if (seen.has(candId)) { baseId = candId; break; }
        if (name.match(/\d+\.?\d*[Bb]/) || name.match(/\d+[Mm]/)) { baseId = candId; break; }
      }
      if (!baseId) continue;
    }

    if (seen.has(baseId)) {
      const parent = all.find(p => p.id === baseId);
      if (parent) {
        parent._injected = true;
        if (gen === _fetchGeneration) _injectedBaseIds.add(baseId);
      }
    } else if (bm && !isBase(m)) {
      const baseAuthor = baseId.split("/")[0];
      if (!seenAuthors.has(baseAuthor)) {
        if (!fetchQueue.has(baseId)) {
          fetchQueue.set(baseId, true);
        }
      }
    }
  }

  const baseIds = [...fetchQueue.keys()];
  let total = 0;
  for (let i = 0; i < baseIds.length; i += CONFIG.INJECTION_BATCH_SIZE) {
    if (gen !== _fetchGeneration) return;
    const batch = baseIds.slice(i, i + CONFIG.INJECTION_BATCH_SIZE);
    total += batch.length;
    status.textContent = `Resolving base models… (${total})`;
    const results = await Promise.allSettled(batch.map(async (baseId) => {
      const full = await fetchJson(`https://huggingface.co/api/models/${baseId}?full=true`);
      full.paramB = getParamCount(full);
      full._injected = true;
      return full;
    }));
    for (const r of results) {
      if (r.status === "fulfilled") {
        const full = r.value;
        injected.push(full);
        seen.add(full.id);
        if (gen === _fetchGeneration) _injectedBaseIds.add(full.id);
      } else {
        console.warn("Failed to fetch base model", r.reason);
      }
    }
    if (gen !== _fetchGeneration) return;
    if (onBatch) onBatch();
  }

  if (gen !== _fetchGeneration) return;
  all.push(...injected);
  all.forEach(m => { if (m._injected && gen === _fetchGeneration) _injectedBaseIds.add(m.id); });
  status.textContent = "";
}
(() => {
  const status = document.getElementById("status");
  document.getElementById("ds-from").max = CONFIG.DATE_SLIDER_MAX;
  document.getElementById("ds-to").max = CONFIG.DATE_SLIDER_MAX;
  document.getElementById("ps-from").max = CONFIG.PARAM_SLIDER_MAX;
  document.getElementById("ps-to").max = CONFIG.PARAM_SLIDER_MAX;
  sortKey = "totalDownloads";
  sortAsc = false;
  updateArrows();
  buildFilterBar();
  buildFromToBars();
  buildSpecialBar();
  buildDateSlider();
  buildParamSlider();
  buildParamLegend();
  const sliderResize = new ResizeObserver(() => { updateDateUI(); updateParamUI(); });
  sliderResize.observe(document.getElementById("date-slider"));
  sliderResize.observe(document.getElementById("param-slider"));
  reseedActiveTaskFilters();
  syncFilterChips();
  document.getElementById("l1-author-filter").addEventListener("input", debouncedTextFilter);
  document.getElementById("l2-model-filter").addEventListener("input", debouncedTextFilter);
  document.getElementById("l3-author-filter").addEventListener("input", debouncedTextFilter);
  document.getElementById("l4-model-filter").addEventListener("input", debouncedTextFilter);
  document.getElementById("text-filter-row").addEventListener("click", e => {
    const fic = e.target.closest(".fic");
    if (!fic) return;
    const input = document.getElementById(fic.dataset.for);
    if (input) { input.value = ""; input.dispatchEvent(new Event("input", { bubbles: true })); }
  });
  markDirty();
  document.getElementById("api-counter").textContent = "API Calls: 0";
  status.textContent = "Select your filters, then click Get Results.";
  renderMain([]);
})();
})();
</script>
