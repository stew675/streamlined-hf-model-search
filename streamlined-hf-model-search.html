<!DOCTYPE html>
<html lang="en">

<style>

 /* Filter bar */

  #filter-bar .filter-chip:hover, #from-bar .filter-chip:hover, #to-bar .filter-chip:hover, #special-bar .filter-chip:hover { background: #1c2129; color: #c9d1d9; }

<script>
const TO_TAGS = [
  // Audio
  { tag: "automatic-speech-recognition", from: ["audio"], to: "text", desc: "Transcribe speech to text" },
  { tag: "audio-classification", from: ["audio"], to: "text", desc: "Classify audio by sound type" },
  { tag: "voice-activity-detection", from: ["audio"], to: "audio", desc: "Detect when speech is present" },
  { tag: "audio-to-audio", from: ["audio"], to: "audio", desc: "Transform input audio to output audio" },
  { tag: "audio-text-to-text", from: ["audio", "text"], to: "text", desc: "Generate text from speech + text prompt" },
  // Text → *
  { tag: "text-to-speech", from: ["text"], to: "speech", desc: "Generate spoken audio from text" },
  { tag: "text-to-audio", from: ["text"], to: "audio", desc: "Generate audio from text description" },
  { tag: "text-to-image", from: ["text"], to: "image", desc: "Generate image from text prompt" },
  { tag: "text-to-video", from: ["text"], to: "video", desc: "Generate video from text prompt" },
  { tag: "text-to-3d", from: ["text"], to: "3d", desc: "Generate 3D assets from text" },
  { tag: "text-generation", from: ["text"], to: "text", desc: "Generate continuing text from a prompt" },
  { tag: "text-classification", from: ["text"], to: "text", desc: "Assign label/class to input text" },
  { tag: "token-classification", from: ["text"], to: "text", desc: "Label individual tokens (NER, POS)" },
  { tag: "question-answering", from: ["text"], to: "text", desc: "Answer a question given a context passage" },
  { tag: "zero-shot-classification", from: ["text"], to: "text", desc: "Classify text into arbitrary labels" },
  { tag: "translation", from: ["text"], to: "text", desc: "Translate text between languages" },
  { tag: "summarization", from: ["text"], to: "text", desc: "Condense long text into a summary" },
  { tag: "fill-mask", from: ["text"], to: "text", desc: "Predict masked tokens in text" },
  { tag: "sentence-similarity", from: ["text"], to: "text", desc: "Score semantic similarity of sentences" },
  { tag: "feature-extraction", from: ["text"], to: "text", desc: "Produce embedding vectors from text" },
  { tag: "text-ranking", from: ["text"], to: "text", desc: "Rank documents by relevance to a query" },
  { tag: "unconditional-image-generation", from: ["text"], to: "image", desc: "Generate image without text prompt" },
  // Image → *
  { tag: "image-to-text", from: ["image"], to: "text", desc: "Describe or caption an image" },
  { tag: "image-classification", from: ["image"], to: "text", desc: "Assign label/class to an image" },
  { tag: "object-detection", from: ["image"], to: "text", desc: "Detect objects with bounding boxes" },
  { tag: "image-segmentation", from: ["image"], to: "text", desc: "Segment image into regions by object" },
  { tag: "zero-shot-image-classification", from: ["image"], to: "text", desc: "Classify image into arbitrary labels" },
  { tag: "zero-shot-object-detection", from: ["image"], to: "text", desc: "Detect objects by arbitrary text labels" },
  { tag: "image-to-image", from: ["image"], to: "image", desc: "Transform an input image (style, enhance)" },
  { tag: "depth-estimation", from: ["image"], to: "image", desc: "Predict depth map from a single image" },
  { tag: "mask-generation", from: ["image"], to: "image", desc: "Generate segmentation mask for an image" },
  { tag: "image-feature-extraction", from: ["image"], to: "image", desc: "Produce embedding vectors from images" },
  { tag: "keypoint-detection", from: ["image"], to: "image", desc: "Detect key body/key-points in image" },
  { tag: "image-to-video", from: ["image"], to: "video", desc: "Generate video from a single image" },
  { tag: "image-to-3d", from: ["image"], to: "3d", desc: "Generate 3D assets from an image" },
  // Video → *
  { tag: "video-classification", from: ["video"], to: "text", desc: "Assign label/class to a video" },
  { tag: "video-to-video", from: ["video"], to: "video", desc: "Transform an input video to output video" },
  { tag: "video-text-to-text", from: ["video", "text"], to: "text", desc: "Generate text from video + text prompt" },
  // Multimodal
  { tag: "image-text-to-text", from: ["image", "text"], to: "text", desc: "Generate text from image + text prompt" },
  { tag: "visual-question-answering", from: ["image", "text"], to: "text", desc: "Answer questions about an image" },
  { tag: "document-question-answering", from: ["image", "text"], to: "text", desc: "Answer questions from a document image" },
  { tag: "visual-document-retrieval", from: ["image", "text"], to: "text", desc: "Retrieve documents from image queries" },
  { tag: "image-text-to-image", from: ["image", "text"], to: "image", desc: "Generate image from image + text prompt" },
  { tag: "image-text-to-video", from: ["image", "text"], to: "video", desc: "Generate video from image + text prompt" },
  { tag: "any-to-any", from: ["any"], to: "any", desc: "Process any input modality to any output" }
];
const FROM_OPTIONS = ["text", "image", "audio", "video", "any", "all"];
const TO_OPTIONS = ["text", "speech", "audio", "image", "video", "3d", "any", "all"];
const activeFromFilters = new Set(["text", "image", "any"]);
const activeToFilters = new Set(["text", "any"]);
const SPECIAL_DISPLAY = ["include untagged"];
const DEFAULT_ACTIVE_TAGS = new Set([
  "any-to-any",
  "audio-to-audio",
  "audio-text-to-text",
  "automatic-speech-recognition",
  "image-text-to-text",
  "image-text-to-image",
  "image-text-to-video",
  "image-to-image",
  "image-to-text",
  "image-to-video",
  "image-to-3d",
  "text-generation",
  "text-to-audio",
  "text-to-image",
  "text-to-speech",
  "text-to-video",
  "text-to-3d",
  "video-classification",
  "video-text-to-text",
  "video-to-video"
]);
const activeSpecialFilters = new Set();
const LIMIT = 500;
const fetchedTasks = new Set();
let fetchedUntagged = false;
const _injectedBaseIds = new Set();
let needsUpdate = false;
let apiCalls = 0;
function incApiCalls(n) { apiCalls += n; document.getElementById("api-counter").textContent = "API Calls: " + String(apiCalls); }
function markDirty() { needsUpdate = true; document.getElementById("get-results-btn").classList.add("ready"); }
let sliderFrom = 68;
let sliderTo = 80;
const PARAM_SLIDER_MAX = 220;
let paramSliderFrom = 30;
let paramSliderTo = 220;
const Q_METHODS = ["awq", "gptq", "bitsandbytes", "eetq", "aqlm", "gguf", "exl2", "marlin", "mlx", "bnb", "fp4", "fp8", "nf4", "int8", "int4", "q8", "q4"];
const FILTER_DISPLAY = ["awq", "fp4", "fp8", "finetune", "gguf", "mlx", "safetensors", "others"];
const activeFilters = new Set(FILTER_DISPLAY);
const activeTaskFilters = new Set();
function resolveTasks() {
  return TO_TAGS.filter(t => {
    const fromMatch = t.from.every(f => activeFromFilters.has(f));
    const toMatch = activeToFilters.has(t.to);
    return fromMatch && toMatch;
  }).map(t => t.tag);
}
function matchesTaskFilter(pipelineTag) {
  if (!pipelineTag) return true;
  const t = TO_TAGS.find(x => x.tag === pipelineTag);
  if (!t) return false;
  const fromMatch = t.from.every(f => activeFromFilters.has(f));
  const toMatch = activeToFilters.has(t.to);
  return fromMatch && toMatch;
}

const _apiTimestamps = [];
const RATE_LIMIT = 10;
const RATE_WINDOW = 1000;

const FETCH_TIMEOUT = 60000;

async function fetchJson(url) {
  let retries = 0;
  const MAX_RETRIES = 3;
  while (true) {
    const now = Date.now();
    const cutoff = now - RATE_WINDOW;
    while (_apiTimestamps.length > 0 && _apiTimestamps[0] < cutoff) {
      _apiTimestamps.shift();
    }
    if (_apiTimestamps.length >= RATE_LIMIT) {
      const wait = _apiTimestamps[0] + RATE_WINDOW - now + 10;
      await new Promise(r => setTimeout(r, wait));
      continue;
    }
    _apiTimestamps.push(now);
    let res;
    try {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), FETCH_TIMEOUT);
      try {
        res = await fetch(url, { signal: controller.signal });
      } finally {
        clearTimeout(timer);
      }
    } catch (err) {
      if (retries < MAX_RETRIES) {
        retries++;
        const delay = Math.min(1000 * Math.pow(2, retries - 1), 30000);
        console.warn(`fetchJson: network error for ${url}, retry ${retries}/${MAX_RETRIES} in ${delay}ms`);
        await new Promise(r => setTimeout(r, delay));
        continue;
      }
      throw err;
    }
    if (res.ok) {
      incApiCalls(1);
      return res.json();
    }
    if ((res.status === 429 || res.status >= 500) && retries < MAX_RETRIES) {
      retries++;
      const delay = Math.min(1000 * Math.pow(2, retries - 1), 30000);
      console.warn(`fetchJson: HTTP ${res.status} for ${url}, retry ${retries}/${MAX_RETRIES} in ${delay}ms`);
      await new Promise(r => setTimeout(r, delay));
      continue;
    }
    incApiCalls(1);
    throw new Error(`HTTP ${res.status}`);
  }
}

async function fetchModels(task) {
  return fetchJson(`https://huggingface.co/api/models?sort=downloads&direction=-1&limit=${LIMIT}&pipeline_tag=${task}&full=true&cardData=true`);
}

async function fetchRecentModels(task) {
  return fetchJson(`https://huggingface.co/api/models?sort=lastModified&direction=-1&limit=${LIMIT}&pipeline_tag=${task}&full=true&cardData=true`);
}

async function fetchUntaggedModels() {
  return fetchJson(`https://huggingface.co/api/models?sort=downloads&direction=-1&limit=${LIMIT}&full=true&cardData=true`);
}

function isBase(model) {
  const cd = model.cardData;
  if (!cd) return true;
  const bm = cd.base_model;
  if (!bm) return true;
  const author = model.id.split("/")[0];
  const firstBase = Array.isArray(bm) ? bm[0] : bm;
  if (firstBase && firstBase.split("/")[0] === author) return true;
  return false;
}

function fmt(n) { return n.toLocaleString(); }
function fmtDate(d) { return d ? new Date(d).toISOString().slice(0, 10) : "—"; }
function fmtAge(d) {
  if (!d) return "";
  const days = Math.floor((Date.now() - new Date(d).getTime()) / 86400000);
  if (days < 30) return `${days}d`;
  if (days < 365) return `${Math.floor(days / 30)}mo`;
  return `${(days / 365).toFixed(1)}y`;
}
function truncate(s, max) { return s.length > max ? s.slice(0, max) + "…" : s; }
function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

function sliderValueToDate(val) {
  if (val === 0) return new Date("2020-01-01");
  if (val === 80) return new Date();
  const d = new Date();
  d.setDate(d.getDate() - (80 - val) * 14);
  return d;
}
function sliderValueToLabel(val) {
  if (val === 0) return "Anytime";
  if (val === 80) return "Now";
  const d = new Date();
  d.setDate(d.getDate() - (80 - val) * 14);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}/${m}/${day}`;
}
function isInDateRange(dateStr) {
  if (!dateStr) return true;
  const c = new Date(dateStr);
  return c >= sliderValueToDate(sliderFrom) && c <= sliderValueToDate(sliderTo);
}
function getParamCount(m) {
  if (m.safetensors && m.safetensors.total) return m.safetensors.total / 1e9;
  const bMatch = m.id.match(/(\d+\.?\d*)[Bb]/);
  if (bMatch) return parseFloat(bMatch[1]);
  const mMatch = m.id.match(/(\d+\.?\d*)[Mm]/);
  if (mMatch) return parseFloat(mMatch[1]) / 1000;
  return null;
}
function paramPosToValue(pos) {
  if (pos <= 0) return 0;
  if (pos >= PARAM_SLIDER_MAX) return Infinity;
  if (pos <= 40) return pos * 0.025;
  if (pos <= 70) return 1 + (pos - 40) * 0.1;
  if (pos <= 100) return 4 + (pos - 70) * 0.2;
  if (pos <= 130) return 10 + (pos - 100) * 1;
  if (pos <= 160) return 40 + (pos - 130) * 2;
  if (pos <= 190) return 100 + (pos - 160) * 10;
  return 400 + (pos - 190) * 20;
}
function valueToPos(val) {
  if (val <= 0) return 0;
  if (val <= 1) return val / 0.025;
  if (val <= 4) return 40 + (val - 1) / 0.1;
  if (val <= 10) return 70 + (val - 4) / 0.2;
  if (val <= 40) return 100 + (val - 10) / 1;
  if (val <= 100) return 130 + (val - 40) / 2;
  if (val <= 400) return 160 + (val - 100) / 10;
  if (val <= 1000) return 190 + (val - 400) / 20;
  return PARAM_SLIDER_MAX;
}
function sliderCenterPct(input, pos, max) {
  const thumbSize = 18, iw = input.clientWidth || 1, pct = pos / (max || PARAM_SLIDER_MAX);
  return (thumbSize / 2 + pct * (iw - thumbSize)) / iw * 100;
}
function paramValueToLabel(val) {
  if (val === Infinity) return ">1T";
  if (val === 0) return "0";
  if (val >= 1000) return `${Math.round(val / 1000)}T`;
  if (val >= 10) return `${Math.round(val)}B`;
  if (val >= 1) return `${val.toFixed(1)}B`;
  return `${Math.round(val * 1000)}M`;
}
function isInParamRange(paramB) {
  if (paramB === null || paramB === undefined) return true;
  const fromVal = paramPosToValue(paramSliderFrom);
  const toVal = paramPosToValue(paramSliderTo);
  return paramB >= fromVal && (toVal === Infinity || paramB <= toVal);
}
function modelPassesAllFilters(m) {
  if (!m._injected && !isInDateRange(m.lastModified)) return false;
  const tag = m.pipeline_tag;
  if (!tag && !activeSpecialFilters.has("include untagged")) return false;
  if (!isInParamRange(m.paramB)) return false;
  if (!matchesTaskFilter(tag)) return false;
  if (tag && !activeTaskFilters.has(tag)) return false;
  return true;
}

function computeAuthorData() {
  const all = window._allFetched || [];
  const map = {};
  all.forEach(m => {
    if (!m._injected && !isInDateRange(m.lastModified)) return;
    const tag = m.pipeline_tag;
    if (!tag && !activeSpecialFilters.has("include untagged")) return;
    if (!isInParamRange(m.paramB)) return;
    if (!matchesTaskFilter(tag)) return;
    if (tag && !activeTaskFilters.has(tag)) return;
    if (!isBase(m)) return;
    const author = m.id.split("/")[0];
    if (!map[author]) map[author] = { author, count: 0, totalDownloads: 0, totalLikes: 0 };
    map[author].count++;
    map[author].totalDownloads += m.downloads || 0;
    map[author].totalLikes += m.likes || 0;
  });
  return Object.values(map);
}

// ── State ──
let sortKey = "totalDownloads";
let sortAsc = false;
const detailSort = {};
const cache = {};
const expandedSections = new Set();

function matchesFilter(qMethod) {
  if (!qMethod) return true;
  const methods = qMethod.toLowerCase().split(",").map(s => s.trim());
  return methods.some(m => {
    const cat = qMethodToCategory(m);
    return activeFilters.has(cat);
  });
}
function qMethodToCategory(method) {
  const m = method.toLowerCase();
  if (["awq", "finetune", "gguf", "mlx", "fp4", "fp8", "safetensors"].includes(m)) return m;
  return "others";
}

function syncFilterChips() {
  document.querySelectorAll("#filter-bar .filter-chip").forEach(chip => {
    const m = chip.dataset.method;
    chip.classList.toggle("active", activeFilters.has(m));
    chip.classList.toggle("inactive", !activeFilters.has(m));
  });
  document.querySelectorAll("#from-bar .filter-chip").forEach(chip => {
    const f = chip.dataset.option;
    chip.classList.toggle("active", activeFromFilters.has(f));
    chip.classList.toggle("inactive", !activeFromFilters.has(f));
  });
  document.querySelectorAll("#to-bar .filter-chip").forEach(chip => {
    const t = chip.dataset.option;
    chip.classList.toggle("active", activeToFilters.has(t));
    chip.classList.toggle("inactive", !activeToFilters.has(t));
  });
  document.querySelectorAll("#special-bar .filter-chip").forEach(chip => {
    const s = chip.dataset.special;
    chip.classList.toggle("active", activeSpecialFilters.has(s));
    chip.classList.toggle("inactive", !activeSpecialFilters.has(s));
  });
  const tasks = resolveTasks().sort();
  const activeContainer = document.getElementById("activated-types");
  const availContainer = document.getElementById("available-types");
  const activeLabel = activeContainer.querySelector(".filter-label");
  const availLabel = availContainer.querySelector(".filter-label");
  const activeTags = [];
  const availTags = [];
  tasks.forEach(tag => {
    if (activeTaskFilters.has(tag)) activeTags.push(tag);
    else availTags.push(tag);
  });
  const showUntagged = activeSpecialFilters.has("include untagged");
  if (showUntagged) activeTags.push("__untagged__");
  const buildTag = (tag) => {
    const desc = TO_TAGS.find(t => t.tag === tag)?.desc || "";
    const el = document.createElement("span");
    el.className = "act-tag active";
    el.dataset.tag = tag;
    el.textContent = tag;
    if (desc) el.title = desc;
    el.addEventListener("click", () => {
      applyActTagLogic(tag);
      syncFilterChips();
      markDirty();
    });
    return el;
  };
  const buildAvailTag = (tag) => {
    const desc = TO_TAGS.find(t => t.tag === tag)?.desc || "";
    const el = document.createElement("span");
    el.className = "act-tag";
    el.dataset.tag = tag;
    el.textContent = tag;
    if (desc) el.title = desc;
    el.addEventListener("click", () => {
      applyActTagLogic(tag);
      syncFilterChips();
      markDirty();
    });
    return el;
  };
  while (activeContainer.lastChild !== activeLabel) activeContainer.removeChild(activeContainer.lastChild);
  while (availContainer.lastChild !== availLabel) availContainer.removeChild(availContainer.lastChild);
  activeTags.forEach(tag => {
    if (tag === "__untagged__") {
      const span = document.createElement("span");
      span.className = "act-tag active";
      span.textContent = "(untagged)";
      activeContainer.appendChild(span);
    } else {
      activeContainer.appendChild(buildTag(tag));
    }
  });
  availTags.forEach(tag => availContainer.appendChild(buildAvailTag(tag)));
}
function applyFilterLogic(method) {
  const wasEnabled = activeFilters.has(method);
  const enabledCount = FILTER_DISPLAY.filter(m => activeFilters.has(m)).length;
  if (!wasEnabled) {
    activeFilters.add(method);
  } else if (enabledCount === FILTER_DISPLAY.length) {
    FILTER_DISPLAY.forEach(m => activeFilters.delete(m));
    activeFilters.add(method);
  } else if (enabledCount === 1) {
    FILTER_DISPLAY.forEach(m => activeFilters.add(m));
  } else {
    activeFilters.delete(method);
  }
}
function applyActTagLogic(tag) {
  const tags = resolveTasks();
  const wasEnabled = activeTaskFilters.has(tag);
  const enabledCount = tags.filter(t => activeTaskFilters.has(t)).length;
  if (!wasEnabled) {
    activeTaskFilters.add(tag);
  } else if (enabledCount === tags.length) {
    tags.forEach(t => activeTaskFilters.delete(t));
    activeTaskFilters.add(tag);
  } else if (enabledCount === 1) {
    tags.forEach(t => activeTaskFilters.add(t));
  } else {
    activeTaskFilters.delete(tag);
  }
}
function buildFilterBar() {
  const bar = document.getElementById("filter-bar");
  FILTER_DISPLAY.forEach(method => {
    const chip = document.createElement("span");
    chip.className = "filter-chip active";
    chip.dataset.method = method;
    chip.textContent = method.toUpperCase();
    chip.addEventListener("click", () => {
      applyFilterLogic(method);
      syncFilterChips();
      markDirty();
    });
    bar.appendChild(chip);
  });
}
function buildFromToBars() {
  buildBar("from-bar", FROM_OPTIONS, activeFromFilters, applyFromLogic);
  buildBar("to-bar", TO_OPTIONS, activeToFilters, applyToLogic);
}
function buildSpecialBar() {
  const bar = document.getElementById("special-bar");
  SPECIAL_DISPLAY.forEach(opt => {
    const chip = document.createElement("span");
    chip.className = "filter-chip inactive";
    chip.dataset.special = opt;
    chip.textContent = opt.replace(/ /g, "\u00A0");
    chip.addEventListener("click", () => {
      if (activeSpecialFilters.has(opt)) {
        activeSpecialFilters.delete(opt);
      } else {
        activeSpecialFilters.add(opt);
      }
      syncFilterChips();
      markDirty();
    });
    bar.appendChild(chip);
  });
}
function buildBar(barId, options, activeSet, clickHandler) {
  const bar = document.getElementById(barId);
  options.forEach(opt => {
    const chip = document.createElement("span");
    chip.className = "filter-chip " + (activeSet.has(opt) ? "active" : "inactive");
    chip.dataset.option = opt;
    chip.textContent = opt.charAt(0).toUpperCase() + opt.slice(1);
    chip.addEventListener("click", () => {
      clickHandler(opt);
      syncFilterChips();
      markDirty();
    });
    bar.appendChild(chip);
  });
}
function reseedActiveTaskFilters() {
  const tasks = resolveTasks();
  const resolvedSet = new Set(tasks);
  for (const tag of activeTaskFilters) {
    if (!resolvedSet.has(tag)) activeTaskFilters.delete(tag);
  }
  tasks.forEach(t => {
    if (DEFAULT_ACTIVE_TAGS.has(t)) activeTaskFilters.add(t);
  });
}
function applyFromLogic(option) {
  applyBarLogic(option, FROM_OPTIONS, activeFromFilters);
  reseedActiveTaskFilters();
}
function applyToLogic(option) {
  applyBarLogic(option, TO_OPTIONS, activeToFilters);
  reseedActiveTaskFilters();
}
function applyBarLogic(option, options, activeSet) {
  const wasEnabled = activeSet.has(option);
  const enabledCount = options.filter(o => activeSet.has(o)).length;
  if (option === "all") {
    if (!wasEnabled) {
      options.forEach(o => activeSet.add(o));
    } else {
      activeSet.delete("all");
    }
  } else if (!wasEnabled) {
    activeSet.add(option);
  } else if (enabledCount === options.length) {
    options.forEach(o => activeSet.delete(o));
    activeSet.add(option);
  } else if (enabledCount === 1) {
    options.forEach(o => activeSet.add(o));
  } else {
    activeSet.delete(option);
  }
}

function sortRows(rows, key, asc) {
  return rows.slice().sort((a, b) => {
    let va = a[key], vb = b[key];
    if (["downloads", "likes", "totalDownloads", "totalLikes", "count", "paramB"].includes(key)) { va = Number(va); vb = Number(vb); }
    else if (["created_at", "updated_at", "lastModified"].includes(key)) { va = new Date(va || 0).getTime(); vb = new Date(vb || 0).getTime(); }
    else { va = String(va || "").toLowerCase(); vb = String(vb || "").toLowerCase(); }
    if (va < vb) return asc ? -1 : 1;
    if (va > vb) return asc ? 1 : -1;
    return 0;
  });
}

// ── Level 1: Authors ──
function renderMain(authorData) {
  expandedSections.clear();
  const tbody = document.getElementById("body");
  const sorted = sortRows(authorData, sortKey, sortAsc);

  let html = "";
  sorted.forEach((a, idx) => {
    html += `<tr class="l1-row" data-l1-idx="${idx}" data-author="${a.author}">
      <td><span class="toggle" id="t1-${idx}">▶</span><a href="https://huggingface.co/${a.author}" target="_blank">${a.author}</a></td>
      <td class="right">${a.count}</td>
      <td class="right">${fmt(a.totalDownloads)}</td>
      <td class="right">${fmt(a.totalLikes)}</td>
    </tr>
    <tr class="detail-row" id="d1-${idx}" style="display:none"><td colspan="4"><div class="detail-inner" id="i1-${idx}"></div></td></tr>`;
  });

  tbody.innerHTML = html;
  document.getElementById("count").textContent =
    `${sorted.length} authors with base models in selected range. Click to expand.`;
}

async function loadAuthorModels(idx, author, container) {
  try {
    const models = cache[author + "_models"] || await fetchJson(
      `https://huggingface.co/api/models?author=${author}&sort=downloads&direction=-1&limit=1000&full=true&cardData=true`
    );
    if (!cache[author + "_models"]) cache[author + "_models"] = models;

    const baseModels = models.filter(m => isBase(m)).map(m => ({
      id: m.id,
      downloads: m.downloads || 0,
      likes: m.likes || 0,
      created_at: m.createdAt || "",
      updated_at: m.lastModified || "",
      lastModified: m.lastModified || "",
      tags: m.tags || [],
      paramB: getParamCount(m),
      pipeline_tag: m.pipeline_tag || ""
    }));

    cache[author] = baseModels;

    const filterApplied = () => baseModels.filter(m => modelPassesAllFilters(m) || _injectedBaseIds.has(m.id));

    const dated = filterApplied();

    const ad = window._authorData;
    for (const a of ad) {
      if (a.author === author) {
        a.count = dated.length;
        a.totalDownloads = dated.reduce((s, m) => s + m.downloads, 0);
        a.totalLikes = dated.reduce((s, m) => s + m.likes, 0);
        break;
      }
    }
    const row = document.querySelector(`.l1-row[data-author="${author}"]`);
    if (row) {
      const cells = row.querySelectorAll("td");
      cells[1].textContent = dated.length;
      cells[2].textContent = fmt(dated.reduce((s, m) => s + m.downloads, 0));
      cells[3].textContent = fmt(dated.reduce((s, m) => s + m.likes, 0));
    }

    renderL2(idx, dated, container);

    const unknownModels = dated.filter(m => m.paramB === null);
    if (unknownModels.length > 0) {
      const statusEl = document.getElementById("status");
      statusEl.textContent = `Resolving parameters for ${author} (${unknownModels.length} models)…`;
      for (let i = 0; i < unknownModels.length; i += 5) {
        const batch = unknownModels.slice(i, i + 5);
        await Promise.all(batch.map(async (m) => {
          try {
            const full = await fetchJson(`https://huggingface.co/api/models/${m.id}?full=true`);
            const p = getParamCount(full);
            if (p !== null) m.paramB = p;
          } catch (e) {
            console.warn("Failed to fetch param for", m.id, e);
          }
        }));
      }
      statusEl.textContent = "";
      const updated = filterApplied();
      const detailRow = document.getElementById(`d1-${idx}`);
      if (detailRow && detailRow.style.display !== "none") {
        renderL2(idx, updated, container);
      }
    }
  } catch (err) {
    container.innerHTML = `<div class="detail-error">Error: ${err.message}</div>`;
  }
}

// ── Level 2: Base Models ──
function renderL2(idx, models, container) {
  const state = detailSort[`l2-${idx}`] || { key: "downloads", asc: false };
  const sorted = sortRows(models, state.key, state.asc);

  const cols = [
    { key: "id", label: "Model ID" },
    { key: "paramB", label: "Params", cls: "right" },
    { key: "lastModified", label: "Updated", cls: "right" },
    { key: "downloads", label: "Downloads", cls: "right" },
    { key: "likes", label: "Likes", cls: "right" }
  ];

  let html = `<table><thead><tr>`;
  cols.forEach(c => {
    html += `<th data-key="${c.key}" data-level="2" class="${c.cls || ''}${state.key === c.key ? ' sorted' : ''}">${c.label} <span class="arrow">${state.key === c.key ? (state.asc ? "▲" : "▼") : ""}</span></th>`;
  });
  html += `</tr></thead><tbody>`;

  sorted.forEach((m, mIdx) => {
    html += `<tr class="l2-row" data-l2-idx="${idx}" data-model-idx="${mIdx}" data-model="${m.id}">
      <td><span class="toggle" id="t2-${idx}-${mIdx}">▶</span><a href="https://huggingface.co/${m.id}" target="_blank" title="${m.id.split("/").slice(1).join("/")}">${truncate(m.id.split("/").slice(1).join("/"), 40)}</a></td>
      <td class="right" style="width:60px;font-size:0.78rem">${m.paramB != null ? paramValueToLabel(m.paramB) : "—"}</td>
      <td class="right">${fmtDate(m.lastModified)} <span style="color:#484f58;font-size:0.75rem">(${fmtAge(m.lastModified)})</span></td>
      <td class="right">${fmt(m.downloads)}</td>
      <td class="right"><span class="likes-icon">♥</span>${fmt(m.likes)}</td>
    </tr>
    <tr class="detail-row" id="d2-${idx}-${mIdx}" style="display:none"><td colspan="5"><div class="detail-inner" id="i2-${idx}-${mIdx}"></div></td></tr>`;
  });

  html += `</tbody></table><div class="detail-count">${models.length} base model(s)</div>`;
  container.innerHTML = html;
  container._l2State = { idx, models };

  if (!container._l2Delegated) {
    container._l2Delegated = true;
    container.addEventListener("click", function(e) {
      const inner = e.target.closest(".detail-inner");
      if (inner && inner !== this) return;
      const s = this._l2State;
      const th = e.target.closest("thead th");
      if (th) {
        if (th.dataset.level !== "2") return;
        const key = th.dataset.key;
        const st = detailSort[`l2-${s.idx}`] || { key: "downloads", asc: false };
        if (st.key === key) st.asc = !st.asc;
        else { st.key = key; st.asc = false; }
        detailSort[`l2-${s.idx}`] = st;
        renderL2(s.idx, s.models, this);
        return;
      }
      const tr = e.target.closest("tr.l2-row");
      if (tr && e.target.tagName !== "A") {
        const l2Idx = parseInt(tr.dataset.l2Idx);
        const modelIdx = parseInt(tr.dataset.modelIdx);
        const modelId = tr.dataset.model;
        const detailRow = document.getElementById(`d2-${l2Idx}-${modelIdx}`);
        const inner = document.getElementById(`i2-${l2Idx}-${modelIdx}`);
        const tog = document.getElementById(`t2-${l2Idx}-${modelIdx}`);
        if (detailRow.style.display === "none") {
          detailRow.style.display = "";
          tog.classList.add("open");
          expandedSections.add(detailRow.id);
          const key = `children-${modelId}`;
          if (cache[key]) {
            renderL3(l2Idx, modelIdx, modelId, cache[key], inner);
          } else {
            inner.innerHTML = '<div class="detail-loading">Fetching children/quantizations…</div>';
            loadChildren(l2Idx, modelIdx, modelId, inner);
          }
        } else {
          detailRow.style.display = "none";
          tog.classList.remove("open");
          expandedSections.delete(detailRow.id);
          ["d3","d4"].forEach(p => {
            const children = [...expandedSections].filter(id => id.startsWith(`${p}-${l2Idx}-${modelIdx}-`));
            children.forEach(id => expandedSections.delete(id));
          });
        }
      }
    });
  }
}

async function loadChildren(l2Idx, modelIdx, parentId, container) {
  try {
    const modelName = parentId.split("/").slice(1).join("/");
    const results = [];
    const seen = new Set();

    const searches = [
      `https://huggingface.co/api/models?search=${encodeURIComponent(parentId)}&sort=downloads&direction=-1&limit=1000&full=true&cardData=true`,
      `https://huggingface.co/api/models?search=${encodeURIComponent(modelName)}&sort=downloads&direction=-1&limit=1000&full=true&cardData=true`
    ];

    for (const url of searches) {
      const models = await fetchJson(url);
      for (const m of models) {
        if (m.id === parentId || seen.has(m.id)) continue;
        seen.add(m.id);

        const cd = m.cardData || {};
        const baseModel = cd.base_model;
        const idLower = m.id.toLowerCase();
        const tagsStr = (m.tags || []).join(" ").toLowerCase();
        const isQuant = Q_METHODS.some(t => idLower.includes(t) || tagsStr.includes(t));
        const hasBaseModel = baseModel === parentId ||
                             Array.isArray(baseModel) && baseModel.some(b => b === parentId);
        const nameMatches = idLower.includes(modelName.toLowerCase());

        if (hasBaseModel || (nameMatches && isQuant)) {
          const childAuthor = m.id.split("/")[0];
          const parentAuthor = parentId.split("/")[0];
          if (hasBaseModel && childAuthor === parentAuthor) continue;
          if (!hasBaseModel && childAuthor === parentAuthor) continue;
          const qMethods = Q_METHODS.filter(t => idLower.includes(t) || tagsStr.includes(t));
          let qMethod = qMethods.length ? qMethods.join(", ") : (hasBaseModel ? "finetune" : (tagsStr.includes("safetensors") ? "safetensors" : "derivative"));
          results.push({
            id: m.id,
            author: m.id.split("/")[0],
            downloads: m.downloads || 0,
            likes: m.likes || 0,
            created_at: m.createdAt || "",
            updated_at: m.lastModified || "",
            lastModified: m.lastModified || "",
            q_method: qMethod,
            tags: m.tags || []
          });
        }
      }
    }

    cache[`children-${parentId}`] = results;
    renderL3(l2Idx, modelIdx, parentId, results, container);
  } catch (err) {
    container.innerHTML = `<div class="detail-error">Error: ${err.message}</div>`;
  }
}

// ── Level 3: Quant Author Groups ──
function renderL3(l2Idx, modelIdx, parentId, children, container) {
  const filtered = children.filter(c => matchesFilter(c.q_method));
  const groups = {};
  filtered.forEach(c => {
    if (!groups[c.author]) groups[c.author] = [];
    groups[c.author].push(c);
  });

  const groupEntries = Object.entries(groups).map(([author, quants]) => ({
    author,
    count: quants.length,
    totalDownloads: quants.reduce((s, q) => s + q.downloads, 0),
    quants
  }));

  const state = detailSort[`l3-${l2Idx}-${modelIdx}`] || { key: "totalDownloads", asc: false };
  const sorted = sortRows(groupEntries, state.key, state.asc);

  const cols = [
    { key: "author", label: "Quant Author" },
    { key: "count", label: "Models", cls: "right" },
    { key: "totalDownloads", label: "Downloads", cls: "right" }
  ];

  let html = `<table><thead><tr>`;
  cols.forEach(c => {
    html += `<th data-key="${c.key}" data-level="3" class="${c.cls || ''}${state.key === c.key ? ' sorted' : ''}">${c.label} <span class="arrow">${state.key === c.key ? (state.asc ? "▲" : "▼") : ""}</span></th>`;
  });
  html += `</tr></thead><tbody>`;

  sorted.forEach((g, gIdx) => {
    html += `<tr class="l3-row" data-l3-l2="${l2Idx}" data-l3-model-idx="${modelIdx}" data-l3-parent="${parentId}" data-l3-idx="${gIdx}" data-l3-author="${g.author}">
      <td><span class="toggle" id="t3-${l2Idx}-${modelIdx}-${gIdx}">▶</span><a href="https://huggingface.co/${g.author}" target="_blank">${g.author}</a></td>
      <td class="right">${g.count}</td>
      <td class="right">${fmt(g.totalDownloads)}</td>
      <td class="right"></td>
    </tr>
    <tr class="detail-row" id="d3-${l2Idx}-${modelIdx}-${gIdx}" style="display:none"><td colspan="4"><div class="detail-inner" id="i3-${l2Idx}-${modelIdx}-${gIdx}"></div></td></tr>`;
  });
  html += `</tbody></table>`;
  html += `<div class="detail-count">${filtered.length} child model(s) from ${groupEntries.length} author(s)${filtered.length !== children.length ? ` (filtered from ${children.length})` : ''}</div>`;
  container.innerHTML = html;
  container._l3State = { l2Idx, modelIdx, parentId, children };

  if (!container._l3Delegated) {
    container._l3Delegated = true;
    container.addEventListener("click", function(e) {
      const inner = e.target.closest(".detail-inner");
      if (inner && inner !== this) return;
      const s = this._l3State;
      const th = e.target.closest("thead th");
      if (th) {
        if (th.dataset.level !== "3") return;
        const key = th.dataset.key;
        if (!key) return;
        const st = detailSort[`l3-${s.l2Idx}-${s.modelIdx}`] || { key: "totalDownloads", asc: false };
        if (st.key === key) st.asc = !st.asc;
        else { st.key = key; st.asc = false; }
        detailSort[`l3-${s.l2Idx}-${s.modelIdx}`] = st;
        renderL3(s.l2Idx, s.modelIdx, s.parentId, s.children, this);
        return;
      }
      const tr = e.target.closest("tr.l3-row");
      if (tr && e.target.tagName !== "A") {
        const l2Idx = parseInt(tr.dataset.l3L2);
        const modelIdx = parseInt(tr.dataset.l3ModelIdx);
        const parentId = tr.dataset.l3Parent;
        const gIdx = parseInt(tr.dataset.l3Idx);
        const author = tr.dataset.l3Author;
        const detailRow = document.getElementById(`d3-${l2Idx}-${modelIdx}-${gIdx}`);
        const inner = document.getElementById(`i3-${l2Idx}-${modelIdx}-${gIdx}`);
        const tog = document.getElementById(`t3-${l2Idx}-${modelIdx}-${gIdx}`);
        if (detailRow.style.display === "none") {
          detailRow.style.display = "";
          tog.classList.add("open");
          expandedSections.add(detailRow.id);
          const allChildren = cache[`children-${parentId}`] || [];
          const quants = allChildren.filter(c => c.author === author && matchesFilter(c.q_method));
          renderL4(l2Idx, modelIdx, gIdx, quants, inner);
        } else {
          detailRow.style.display = "none";
          tog.classList.remove("open");
          expandedSections.delete(detailRow.id);
          const children = [...expandedSections].filter(id => id.startsWith(`d4-${l2Idx}-${modelIdx}-${gIdx}-`));
          children.forEach(id => expandedSections.delete(id));
        }
      }
    });
  }
}

// ── Level 4: Individual Quantizations ──
function renderL4(l2Idx, modelIdx, gIdx, quants, container) {
  // FIX: Define state object first
  const st = detailSort[`l4-${l2Idx}-${modelIdx}-${gIdx}`] || { key: "downloads", asc: false };
  
  // FIX: Pass st.key and st.asc explicitly to sortRows
  const sorted = sortRows(quants, st.key, st.asc);

  const cols = [
    { key: "id", label: "Model ID" },
    { key: "q_method", label: "Quant" },
    { key: "downloads", label: "Downloads", cls: "right" },
    { key: "likes", label: "Likes", cls: "right" },
    { key: "lastModified", label: "Updated", cls: "right" }
  ];

  let html = `<table><thead><tr>`;
  cols.forEach(c => {
    html += `<th data-key="${c.key}" data-level="4" class="${c.cls || ''}${st.key === c.key ? ' sorted' : ''}">${c.label} <span class="arrow">${st.key === c.key ? (st.asc ? "▲" : "▼") : ""}</span></th>`;
  });
  html += `</tr></thead><tbody>`;

  sorted.forEach(q => {
    html += `<tr class="l4-row">
      <td><a href="https://huggingface.co/${q.id}" target="_blank" title="${q.id.split("/").slice(1).join("/")}">${truncate(q.id.split("/").slice(1).join("/"), 64)}</a></td>
      <td><span class="badge ${q.q_method === 'derivative' || q.q_method === 'finetune' ? 'deriv' : ''}">${q.q_method}</span></td>
      <td class="right">${fmt(q.downloads)}</td>
      <td class="right"><span class="likes-icon">♥</span>${fmt(q.likes)}</td>
      <td class="right">${fmtDate(q.lastModified)}</td>
    </tr>`;
  });

  html += `</tbody></table>`;
  container.innerHTML = html;
  container._l4State = { l2Idx, modelIdx, gIdx, quants };

  if (!container._l4Delegated) {
    container._l4Delegated = true;
    container.addEventListener("click", function(e) {
      const th = e.target.closest("thead th");
      if (!th || th.dataset.level !== "4") return;
      const s = this._l4State;
      const key = th.dataset.key;
      const st = detailSort[`l4-${s.l2Idx}-${s.modelIdx}-${s.gIdx}`] || { key: "downloads", asc: false };
      if (st.key === key) st.asc = !st.asc;
      else { st.key = key; st.asc = false; }
      detailSort[`l4-${s.l2Idx}-${s.modelIdx}-${s.gIdx}`] = st;
      renderL4(s.l2Idx, s.modelIdx, s.gIdx, s.quants, this);
    });
  }
}

// ── Refresh all expanded sections when filter changes ──
function refreshAllExpanded() {
  if (expandedSections.size === 0) return;

  for (const id of expandedSections) {
    if (id.startsWith("d1-")) {
      const idx = parseInt(id.slice(3));
      const detailRow = document.getElementById(id);
      if (!detailRow || detailRow.style.display === "none") continue;
      const tr = detailRow.previousElementSibling;
      if (!tr || !tr.classList.contains("l1-row")) continue;
      const author = tr.dataset.author;
      const models = cache[author];
      if (models) {
        const inner = document.getElementById(`i1-${idx}`);
        renderL2(idx, models.filter(m => modelPassesAllFilters(m) || _injectedBaseIds.has(m.id)), inner);
      }
    } else if (id.startsWith("d2-")) {
      const parts = id.split("-");
      const l2Idx = parseInt(parts[1]);
      const modelIdx = parseInt(parts[2]);
      const detailRow = document.getElementById(id);
      if (!detailRow || detailRow.style.display === "none") continue;
      const tr = detailRow.previousElementSibling;
      if (!tr || !tr.classList.contains("l2-row")) continue;
      const modelId = tr.dataset.model;
      const children = cache[`children-${modelId}`];
      if (children) {
        const inner = document.getElementById(`i2-${l2Idx}-${modelIdx}`);
        renderL3(l2Idx, modelIdx, modelId, children, inner);
      }
    } else if (id.startsWith("d3-")) {
      const parts = id.split("-");
      const l2Idx = parseInt(parts[1]);
      const modelIdx = parseInt(parts[2]);
      const gIdx = parseInt(parts[3]);
      const detailRow = document.getElementById(id);
      if (!detailRow || detailRow.style.display === "none") continue;
      const tr = detailRow.previousElementSibling;
      if (!tr || !tr.classList.contains("l3-row")) continue;
      const parentId = tr.dataset.l3Parent;
      const author = tr.dataset.l3Author;
      const allChildren = cache[`children-${parentId}`] || [];
      const quants = allChildren.filter(c => c.author === author && matchesFilter(c.q_method));
      const inner = document.getElementById(`i3-${l2Idx}-${modelIdx}-${gIdx}`);
      renderL4(l2Idx, modelIdx, gIdx, quants, inner);
    }
  }
}

// ── Date slider ──
function buildDateSlider() {
  const from = document.getElementById("ds-from");
  const to = document.getElementById("ds-to");

  from.value = sliderFrom;
  to.value = sliderTo;

  const clamp = (isFrom) => {
    let fv = parseInt(from.value);
    let tv = parseInt(to.value);
    if (isFrom) {
      if (fv >= tv) {
        to.value = String(Math.min(fv + 1, 80));
        tv = parseInt(to.value);
        from.value = String(tv - 1);
      }
    } else {
      if (tv <= fv) {
        from.value = String(Math.max(tv - 1, 0));
        fv = parseInt(from.value);
        to.value = String(fv + 1);
      }
    }
  };
  const read = () => { sliderFrom = parseInt(from.value); sliderTo = parseInt(to.value); };

  const sliderMarkDirty = debounce(markDirty, 200);
  from.addEventListener("input", () => { clamp(true); read(); updateDateUI(); });
  from.addEventListener("change", () => { clamp(true); read(); sliderMarkDirty(); });
  to.addEventListener("input", () => { clamp(false); read(); updateDateUI(); });
  to.addEventListener("change", () => { clamp(false); read(); sliderMarkDirty(); });

  updateDateUI();
}

function applyFilters() {
  if (!needsUpdate) return;
  needsUpdate = false;
  document.getElementById("get-results-btn").classList.remove("ready");
  const tasks = resolveTasks().filter(t => activeTaskFilters.has(t));
  const newTasks = tasks.filter(t => !fetchedTasks.has(t));
  const needUntagged = activeSpecialFilters.has("include untagged") && !fetchedUntagged;
  if (newTasks.length > 0 || needUntagged) {
    (async () => {
      const status = document.getElementById("status");
      status.textContent = `Fetching models…`;
      let fresh = [];
      if (newTasks.length > 0) {
        fresh = await fetchTasks(newTasks);
      }
      if (needUntagged) {
        const raw = await fetchUntaggedModels();
        fresh = fresh.concat(raw.filter(m => !m.pipeline_tag));
        fetchedUntagged = true;
      }
      const seen = new Set((window._allFetched || []).map(m => m.id));
      const all = [...(window._allFetched || [])];
      for (const m of fresh) {
        if (!seen.has(m.id)) {
          seen.add(m.id);
          all.push(m);
        }
      }
      window._allFetched = all;
      try {
        await injectBaseModels(all);
      } catch (e) {
        console.warn("Base model injection error:", e);
      }
      status.textContent = "";
      document.getElementById("get-results-btn").textContent = "Refresh";
      window._authorData = computeAuthorData();
      renderMain(window._authorData);
      updateArrows();
      refreshAllExpanded();
    })();
  } else {
    document.getElementById("get-results-btn").textContent = "Refresh";
    window._authorData = computeAuthorData();
    renderMain(window._authorData);
    updateArrows();
    refreshAllExpanded();
  }
}

function updateDateUI() {
  document.getElementById("ds-from-label").textContent = sliderValueToLabel(sliderFrom);
  document.getElementById("ds-to-label").textContent = sliderValueToLabel(sliderTo);

  const fromInput = document.getElementById("ds-from");
  const toInput = document.getElementById("ds-to");
  const left = sliderCenterPct(fromInput, sliderFrom, 80);
  const right = sliderCenterPct(toInput, sliderTo, 80);
  const fill = document.getElementById("ds-fill");
  fill.style.left = left + "%";
  fill.style.width = (right - left) + "%";

  const tipFrom = document.getElementById("ds-tooltip-from");
  const tipTo = document.getElementById("ds-tooltip-to");
  if (tipFrom) { tipFrom.style.left = left + "%"; tipFrom.className = "ps-tooltip align-right"; tipFrom.textContent = sliderValueToLabel(sliderFrom); }
  if (tipTo) { tipTo.style.left = right + "%"; tipTo.className = "ps-tooltip align-left"; tipTo.textContent = sliderValueToLabel(sliderTo); }
}

// ── Param slider ──
function buildParamLegend() {
  const input = document.getElementById("ps-from");
  const legend = document.getElementById("ps-legend");
  const ticks = [0, 0.5, 1, 4, 10, 40, 100, 400, 1000];
  legend.innerHTML = ticks.map(v => {
    const left = sliderCenterPct(input, valueToPos(v));
    return `<div class="ps-legend-tick" style="left:${left}%"><span class="ps-legend-label">${paramValueToLabel(v)}</span></div>`;
  }).join("");
}
function buildParamSlider() {
  const from = document.getElementById("ps-from");
  const to = document.getElementById("ps-to");

  from.value = paramSliderFrom;
  to.value = paramSliderTo;

  const clamp = (isFrom) => {
    let fv = parseInt(from.value);
    let tv = parseInt(to.value);
    const minGap = 5;
    if (isFrom) {
      if (fv >= tv - (minGap - 1)) {
        to.value = String(Math.min(fv + minGap, parseInt(to.max)));
        tv = parseInt(to.value);
        from.value = String(tv - minGap);
      }
    } else {
      if (tv <= fv + (minGap - 1)) {
        from.value = String(Math.max(tv - minGap, parseInt(from.min)));
        fv = parseInt(from.value);
        to.value = String(fv + minGap);
      }
    }
  };
  const read = () => { paramSliderFrom = parseInt(from.value); paramSliderTo = parseInt(to.value); };

  const sliderMarkDirty = debounce(markDirty, 200);
  from.addEventListener("input", () => { clamp(true); read(); updateParamUI(); });
  from.addEventListener("change", () => { clamp(true); read(); sliderMarkDirty(); });
  to.addEventListener("input", () => { clamp(false); read(); updateParamUI(); });
  to.addEventListener("change", () => { clamp(false); read(); sliderMarkDirty(); });

  updateParamUI();
}

function updateParamUI() {
  const fromVal = paramPosToValue(paramSliderFrom);
  const toVal = paramPosToValue(paramSliderTo);

  const fromInput = document.getElementById("ps-from");
  const toInput = document.getElementById("ps-to");
  const left = sliderCenterPct(fromInput, paramSliderFrom);
  const right = sliderCenterPct(toInput, paramSliderTo);

  document.getElementById("ps-from-label").textContent = paramValueToLabel(fromVal);
  document.getElementById("ps-to-label").textContent = paramValueToLabel(toVal);

  const fill = document.getElementById("ps-fill");
  fill.style.left = left + "%";
  fill.style.width = (right - left) + "%";

  const tipFrom = document.getElementById("ps-tooltip-from");
  const tipTo = document.getElementById("ps-tooltip-to");
  if (tipFrom) { tipFrom.style.left = left + "%"; tipFrom.textContent = paramValueToLabel(fromVal); }
  if (tipTo) { tipTo.style.left = right + "%"; tipTo.textContent = paramValueToLabel(toVal); }
}

// ── Main Table Sort ──
function updateArrows() {
  document.querySelectorAll("#main-table thead th").forEach(th => {
    const arrow = th.querySelector(".arrow");
    const active = th.dataset.key === sortKey;
    arrow.textContent = active ? (sortAsc ? "▲" : "▼") : "";
    th.classList.toggle("sorted", active);
  });
}

document.querySelector("#main-table").addEventListener("click", e => {
  if (e.target.closest(".detail-inner")) return;
  const th = e.target.closest("#main-table > thead > tr > th");
  if (th) {
    const key = th.dataset.key;
    if (sortKey === key) sortAsc = !sortAsc;
    else { sortKey = key; sortAsc = false; }
    renderMain(window._authorData);
    updateArrows();
    return;
  }
  const tr = e.target.closest("tr.l1-row");
  if (tr && e.target.tagName !== "A") {
    const idx = parseInt(tr.dataset.l1Idx);
    const author = tr.dataset.author;
    const detailRow = document.getElementById(`d1-${idx}`);
    const inner = document.getElementById(`i1-${idx}`);
    const tog = document.getElementById(`t1-${idx}`);
    if (detailRow.style.display === "none") {
      detailRow.style.display = "";
      tog.classList.add("open");
      expandedSections.add(detailRow.id);
      if (!cache[author]) {
        inner.innerHTML = '<div class="detail-loading">Fetching base models…</div>';
        loadAuthorModels(idx, author, inner);
      } else {
        renderL2(idx, cache[author].filter(m => modelPassesAllFilters(m) || _injectedBaseIds.has(m.id)), inner);
      }
    } else {
      detailRow.style.display = "none";
      tog.classList.remove("open");
      expandedSections.delete(detailRow.id);
      ["d2","d3","d4"].forEach(p => {
        const children = [...expandedSections].filter(id => id.startsWith(`${p}-${idx}-`));
        children.forEach(id => expandedSections.delete(id));
      });
    }
  }
});
document.getElementById("get-results-btn").addEventListener("click", applyFilters);

// ── Init ──
async function fetchTasks(tasks) {
  const status = document.getElementById("status");
  const seen = new Set();
  const allFetched = [];
  for (let i = 0; i < tasks.length; i++) {
    status.textContent = `Fetching ${tasks[i]}… (${i + 1}/${tasks.length})`;
    try {
      const downloadsModels = await fetchModels(tasks[i]);
      const recentModels = await fetchRecentModels(tasks[i]);
      const combined = [...downloadsModels, ...recentModels];
      for (const m of combined) {
        if (seen.has(m.id)) continue;
        seen.add(m.id);
        m.paramB = getParamCount(m);
        if (!m.pipeline_tag) m.pipeline_tag = tasks[i];
        allFetched.push(m);
      }
      fetchedTasks.add(tasks[i]);
    } catch (e) {
      status.textContent = `Error fetching ${tasks[i]}: ${e.message}`;
    }
  }
  return allFetched;
}

async function injectBaseModels(all) {
  const needed = new Map();
  const seen = new Set(all.map(m => m.id));
  const snapshot = all.slice();
  const existingParents = new Set();

  for (const m of snapshot) {
    if (!isInDateRange(m.lastModified)) continue;
    const cd = m.cardData;
    if (!cd) continue;
    const bm = cd.base_model;
    if (!bm) continue;
    const baseId = Array.isArray(bm) ? bm[0] : bm;
    if (seen.has(baseId)) {
      existingParents.add(baseId);
    } else if (!isBase(m)) {
      needed.set(baseId, baseId.split("/")[0]);
    }
  }

  _injectedBaseIds.clear();
  for (const baseId of existingParents) {
    const parent = all.find(m => m.id === baseId);
    if (parent) {
      parent._injected = true;
      _injectedBaseIds.add(baseId);
    }
  }

  if (needed.size === 0) return;

  const status = document.getElementById("status");
  status.textContent = `Resolving ${needed.size} referenced base models…`;

  let count = 0;
  const entries = [...needed.entries()];
  for (let i = 0; i < entries.length; i += 5) {
    const batch = entries.slice(i, i + 5);
    await Promise.all(batch.map(async ([baseId]) => {
      try {
        const full = await fetchJson(`https://huggingface.co/api/models/${baseId}?full=true`);
        full.paramB = getParamCount(full);
        full._injected = true;
        all.push(full);
        _injectedBaseIds.add(baseId);
        count++;
      } catch (e) {
        console.warn("Failed to fetch base model", baseId, e);
      }
    }));
    status.textContent = `Resolving referenced base models… (${Math.min(count, needed.size)}/${needed.size})`;
  }

  status.textContent = "";
}
(() => {
  const status = document.getElementById("status");
  sortKey = "totalDownloads";
  sortAsc = false;
  updateArrows();

})();
